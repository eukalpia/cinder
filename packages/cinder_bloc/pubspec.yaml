name: cinder_bloc
description: Flutter-style BLoC widgets and context extensions for Cinder.
version: 1.0.0-dev.2
repository: https://github.com/eukalpia/cinder

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  bloc: ^9.2.1
  cinder: ^1.0.0-dev.2
  cinder_nested: ^1.0.0-dev.2
  cinder_provider: ^1.0.0-dev.2

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.6

dependency_overrides:
  cinder:
    path: ../..
  cinder_nested:
    path: ../cinder_nested
  cinder_provider:
    path: ../cinder_provider
