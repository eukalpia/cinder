name: Apply corrected application platform source

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-application-platform-corrected.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/application-platform-and-charts
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Verify and apply source payload
        shell: bash
        run: |
          cat \
            .github/platform-payload/part-00.b64 \
            .github/platform-payload/part-01.b64 \
            .github/platform-payload/part-02.b64 \
            .github/platform-payload/part-03a.b64 \
            .github/platform-payload/part-03b.b64 \
            .github/platform-payload/part-04.b64 \
            .github/platform-payload/part-05.b64 \
            .github/platform-payload/part-06.b64 \
            .github/platform-payload/part-07.b64 \
            > /tmp/cinder-product-changes.b64
          test "$(wc -c < /tmp/cinder-product-changes.b64)" -eq 76360
          echo "9001d7ddbf5ddb2969c87b644f80e66f0fa63e800f5ab70e22401dae7a5f5ed7  /tmp/cinder-product-changes.b64" | sha256sum -c -
          base64 --decode /tmp/cinder-product-changes.b64 > /tmp/cinder-product-changes.tar.gz
          gzip -t /tmp/cinder-product-changes.tar.gz
          tar -xzf /tmp/cinder-product-changes.tar.gz -C .
          rm -rf \
            .github/platform-payload \
            .github/workflows/apply-application-platform.yml \
            .github/workflows/apply-application-platform-pr.yml \
            .github/workflows/apply-application-platform-v2.yml \
            .github/workflows/apply-application-platform-final.yml \
            .github/workflows/apply-application-platform-corrected.yml \
            .github/workflows/inspect-application-archive.yml \
            .github/workflows/inspect-platform-parts.yml \
            .github/workflows/inspect-platform-parts-artifact.yml \
            .github/workflows/export-source.yml \
            .github/workflows/export-dart-sdk.yml \
            .github/workflows/export-pub-cache.yml
      - name: Validate source changes
        shell: bash
        run: |
          dart pub get
          mapfile -t dart_files < <(git ls-files -m -o --exclude-standard -- '*.dart')
          dart format "${dart_files[@]}"
          dart analyze --fatal-infos
          dart test --reporter compact
          dart run benchmark/benchmark.dart data --ci
      - name: Commit source changes
        shell: bash
        run: |
          git config user.name "Cinder Maintainer"
          git config user.email "120781817+eukalpia@users.noreply.github.com"
          git add -A
          git commit -m "feat: build application platform and data visualization"
          git push origin HEAD:feature/application-platform-and-charts
