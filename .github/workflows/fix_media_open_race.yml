name: Fix Media Open Lifecycle

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'feature/media-data-cli-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Apply lifecycle fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/src/media/media.dart')
          text = path.read_text()

          text = text.replace(
              '  Future<void> close();\n}',
              '  Future<void> close();\n\n  Future<void> dispose() => close();\n}',
              1,
          )

          text = text.replace(
              '  int _droppedFrames = 0;\n',
              '  int _droppedFrames = 0;\n  int _openGeneration = 0;\n  bool _disposed = false;\n',
              1,
          )

          old_open = '''  Future<void> open(String source, {bool autoPlay = false}) async {
            _setState(MediaPlaybackState.loading);
            try {
              _info = await backend.open(_toUri(source));
              await _subscription?.cancel();
              _subscription = backend.videoFrames.listen(_acceptFrame, onError: _fail);
              clock.seek(Duration.zero);
              _setState(MediaPlaybackState.ready);
              if (autoPlay) await play();
            } catch (error) {
              _fail(error);
              rethrow;
            }
          }
          '''
          new_open = '''  Future<void> open(String source, {bool autoPlay = false}) async {
            if (_disposed) {
              throw StateError('The media controller has been disposed.');
            }
            final generation = ++_openGeneration;
            _setState(MediaPlaybackState.loading);
            try {
              final info = await backend.open(_toUri(source));
              if (_disposed || generation != _openGeneration) {
                await backend.close();
                return;
              }
              _info = info;
              await _subscription?.cancel();
              _subscription = backend.videoFrames.listen(_acceptFrame, onError: _fail);
              clock.seek(Duration.zero);
              _setState(MediaPlaybackState.ready);
              if (autoPlay && !_disposed && generation == _openGeneration) {
                await play();
              }
            } catch (error) {
              if (_disposed || generation != _openGeneration) {
                return;
              }
              _fail(error);
              rethrow;
            }
          }
          '''
          if old_open not in text:
              raise SystemExit('MediaController.open block not found')
          text = text.replace(old_open, new_open, 1)

          old_dispose = '''  @override
          void dispose() {
            _state = MediaPlaybackState.disposed;
            _subscription?.cancel();
            unawaited(backend.close());
            super.dispose();
          }
          '''
          new_dispose = '''  @override
          void dispose() {
            if (_disposed) {
              return;
            }
            _disposed = true;
            _openGeneration++;
            _state = MediaPlaybackState.disposed;
            _subscription?.cancel();
            unawaited(backend.dispose());
            super.dispose();
          }
          '''
          if old_dispose not in text:
              raise SystemExit('MediaController.dispose block not found')
          text = text.replace(old_dispose, new_dispose, 1)

          backend_open_start = text.index('  @override\n  Future<MediaInfo> open(Uri source) async {', text.index('class FfmpegMediaBackend'))
          backend_open_end = text.index('\n  @override\n  Future<void> play({', backend_open_start)
          backend_open = '''  @override
          Future<MediaInfo> open(Uri source) async {
            _ensureActive();
            await _stopProcesses();
            _source = null;
            _info = null;
            _position = Duration.zero;
            final generation = ++_generation;

            final result = await Process.run(
              ffprobe,
              <String>[
                '-v',
                'error',
                '-print_format',
                'json',
                '-show_streams',
                '-show_format',
                _input(source),
              ],
              runInShell: Platform.isWindows,
            );
            if (result.exitCode != 0) {
              throw ProcessException(
                ffprobe,
                const <String>[],
                result.stderr.toString(),
                result.exitCode,
              );
            }

            final json = jsonDecode(result.stdout.toString()) as Map<String, dynamic>;
            final streams =
                (json['streams'] as List<dynamic>? ?? const <dynamic>[])
                    .whereType<Map<String, dynamic>>()
                    .toList();
            final video = streams
                .where((stream) => stream['codec_type'] == 'video')
                .firstOrNull;
            final audio = streams.any((stream) => stream['codec_type'] == 'audio');
            final format = json['format'] as Map<String, dynamic>?;
            final durationSeconds = double.tryParse(
                  '${format?['duration'] ?? video?['duration'] ?? 0}',
                ) ??
                0;
            final rate = _parseRate(
              '${video?['avg_frame_rate'] ?? video?['r_frame_rate'] ?? ''}',
            );
            final info = MediaInfo(
              duration: Duration(
                microseconds: (durationSeconds * 1000000).round(),
              ),
              width: video?['width'] as int?,
              height: video?['height'] as int?,
              frameRate: rate,
              hasAudio: audio,
              hasVideo: video != null,
            );

            if (_disposed || generation != _generation) {
              throw StateError('Media open was cancelled.');
            }

            _source = source;
            _info = info;
            return info;
          }
          '''
          text = text[:backend_open_start] + backend_open + text[backend_open_end:]

          text = text.replace(
              '  Future<void> dispose() async {\n    if (_disposed) {',
              '  @override\n  Future<void> dispose() async {\n    if (_disposed) {',
              1,
          )

          path.write_text(text)
          PY

      - name: Add regression tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('test/media_controller_test.dart')
          text = path.read_text()
          text = text.replace("import 'dart:typed_data';\n", "import 'dart:io';\nimport 'dart:typed_data';\n", 1)
          insert = r'''

  test('disposing during auto play does not start playback later', () async {
    final backend = _DelayedBackend();
    final controller = MediaController(backend: backend);

    final opening = controller.open('sample.mp4', autoPlay: true);
    controller.dispose();
    backend.completeOpen();
    await opening;

    expect(backend.playCalls, 0);
    expect(backend.disposeCalls, 1);
  });

  test('closing during ffprobe cancels the pending open atomically', () async {
    if (Platform.isWindows) {
      return;
    }

    final directory = await Directory.systemTemp.createTemp('cinder_media_open_');
    addTearDown(() => directory.delete(recursive: true));
    final probe = File('${directory.path}/ffprobe');
    await probe.writeAsString('''#!/bin/sh
sleep 0.15
printf '%s\\n' '{"streams":[{"codec_type":"video","width":2,"height":2,"avg_frame_rate":"30/1"}],"format":{"duration":"1"}}'
''');
    await Process.run('chmod', <String>['+x', probe.path]);

    final media = File('${directory.path}/sample.mp4')..writeAsBytesSync(<int>[]);
    final backend = FfmpegMediaBackend(
      ffprobe: probe.path,
      ffmpeg: '/bin/true',
      ffplay: '/bin/true',
    );
    addTearDown(backend.dispose);

    final opening = backend.open(media.uri);
    await Future<void>.delayed(const Duration(milliseconds: 25));
    await backend.close();

    await expectLater(
      opening,
      throwsA(
        isA<StateError>().having(
          (error) => error.message,
          'message',
          contains('cancelled'),
        ),
      ),
    );
  });
'''
          text = text.replace('\n}\n\nclass _Backend implements MediaBackend {', insert + '\n}\n\nclass _Backend implements MediaBackend {', 1)
          text += r'''

class _DelayedBackend implements MediaBackend {
  final Completer<MediaInfo> _openCompleter = Completer<MediaInfo>();
  final StreamController<VideoFrame> _frames = StreamController<VideoFrame>();
  int playCalls = 0;
  int disposeCalls = 0;

  void completeOpen() {
    if (!_openCompleter.isCompleted) {
      _openCompleter.complete(
        const MediaInfo(duration: Duration(seconds: 1), hasVideo: true),
      );
    }
  }

  @override
  Stream<VideoFrame> get videoFrames => _frames.stream;

  @override
  Future<MediaInfo> open(Uri source) => _openCompleter.future;

  @override
  Future<void> play({
    required Duration position,
    required double volume,
    required double speed,
  }) async {
    playCalls++;
  }

  @override
  Future<void> pause() async {}

  @override
  Future<void> seek(Duration position) async {}

  @override
  Future<void> setSpeed(double speed) async {}

  @override
  Future<void> setVolume(double volume) async {}

  @override
  Future<void> close() async {}

  @override
  Future<void> dispose() async {
    disposeCalls++;
    if (!_frames.isClosed) {
      await _frames.close();
    }
  }
}
'''
          path.write_text(text)
          PY

      - name: Validate
        run: |
          dart pub get
          dart format lib/src/media/media.dart test/media_controller_test.dart
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart --reporter expanded

      - name: Commit clean fix
        run: |
          rm .github/workflows/fix_media_open_race.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): make open and disposal lifecycle atomic"
          git push origin HEAD:feature/media-data-cli-clean
