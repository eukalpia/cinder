name: Format Adapters With Package Config

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/format-language-version.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feature/web-runtime-polish'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/web-runtime-polish
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve root package language version
        run: dart pub get
      - name: Format adapters with package configuration
        run: >-
          dart format
          docs-site/browser-adapters/image-demo.dart
          docs-site/browser-adapters/pty-controller-demo.dart
      - name: Commit formatter output and remove one-shot workflow
        shell: bash
        run: |
          git rm .github/workflows/format-language-version.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs-site/browser-adapters/image-demo.dart docs-site/browser-adapters/pty-controller-demo.dart
          git commit -m 'style(web): format adapters with package language version'
          git push origin HEAD:feature/web-runtime-polish
