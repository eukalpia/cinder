name: Normalize Changed Dart Sources

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'feature/media-data-cli-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Format changed root Dart files
        run: |
          git fetch origin main
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main HEAD | grep -E '^(lib|test|example|benchmark)/.*\.dart$' || true)
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
          fi

      - name: Validate
        run: |
          dart pub get
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart test/data_widgets_test.dart

      - name: Commit normalized sources
        run: |
          rm .github/workflows/format_media_pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: normalize media and data sources"
          git push origin HEAD:feature/media-data-cli-clean
