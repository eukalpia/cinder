name: Capture Renderer V2 error

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/capture_renderer_v2_error.yml'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: python3 .github/scripts/finalize_renderer_v2.py
      - run: |
          dart format \
            lib/src/buffer.dart \
            lib/src/rendering/frame_diff.dart \
            lib/src/framework/terminal_canvas.dart \
            lib/src/binding/terminal_binding.dart \
            lib/src/utils/escape_codes.dart \
            test/rendering/buffer_v2_test.dart \
            test/rendering/frame_diff_test.dart \
            benchmark/renderer_v2_benchmark.dart
      - run: dart pub get
      - name: Capture analyzer
        shell: bash
        run: |
          set +e
          dart analyze lib/src/buffer.dart lib/src/rendering/frame_diff.dart lib/src/framework/terminal_canvas.dart lib/src/binding/terminal_binding.dart lib/src/utils/escape_codes.dart test/rendering benchmark/renderer_v2_benchmark.dart > /tmp/renderer-analyze.log 2>&1
          status=$?
          tail -n 160 /tmp/renderer-analyze.log > renderer_v2_error.log
          git config user.name "Cinder Diagnostics Bot"
          git config user.email "actions@users.noreply.github.com"
          git add renderer_v2_error.log
          git commit --no-verify -m "diagnostics: capture Renderer V2 analyzer output" || true
          git push origin HEAD:dev
          exit "$status"
