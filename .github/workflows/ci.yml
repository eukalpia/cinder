name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format_media_player:
    name: Format media player feature
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/media-player-controls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-player-controls
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply runtime fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          media = Path('lib/src/media/media.dart')
          text = media.read_text()
          old = """            '-nodisp',
            '-autoexit',
            '-nostdin',
            '-loglevel',
"""
          new = """            '-nodisp',
            '-autoexit',
            '-loglevel',
"""
          if old in text:
              text = text.replace(old, new, 1)
          media.write_text(text)

          image = Path('lib/src/components/image.dart')
          text = image.read_text()
          old = """  set imageData(ImageData value) {
    if (_imageData == value) return;
    _imageData = value;
    _cachedEncodedData = null;
    _cachedScaledImage = null;
    _cachedBlockCells = null;
    _kittyImageId = null; // Reset so new ID is generated on next paint
    markNeedsLayout();
  }
"""
          new = """  set imageData(ImageData value) {
    if (identical(_imageData, value)) return;
    final geometryChanged =
        _imageData.width != value.width || _imageData.height != value.height;
    _imageData = value;
    _cachedEncodedData = null;
    _cachedScaledImage = null;
    _cachedBlockCells = null;
    _cachedPalette = null;
    _cachedIndexedPixels = null;
    _kittyImageId = null;
    if (geometryChanged) {
      markNeedsLayout();
    } else {
      markNeedsPaint();
    }
  }
"""
          if old in text:
              text = text.replace(old, new, 1)
          image.write_text(text)
          PY
      - name: Resolve dependencies
        run: dart pub get
      - name: Format sources
        run: |
          dart format \
            lib/cinder.dart \
            lib/src/components/image.dart \
            lib/src/media/media.dart \
            lib/src/media/media_player.dart \
            lib/src/media/ffmpeg_process_backend.dart \
            example/media_player.dart
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test media
        run: dart test test/media_controller_test.dart --reporter expanded
      - name: Commit formatted product files
        run: |
          rm -f .github/workflows/format_media_player.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes required."
          else
            git commit -m "feat(media): finalize interactive player runtime"
            git push origin HEAD:feature/media-player-controls
          fi

  root:
    name: Root package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Check formatting of changed Dart files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base="$BASE_SHA"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base" HEAD | grep -E '^(lib|test|example|benchmark)/.*\.dart$' || true)
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
            git diff --exit-code -- "${files[@]}"
          else
            echo "No changed root Dart files."
          fi
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test
        run: dart test --reporter expanded

  packages:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - cinder_nested
          - cinder_provider
          - cinder_riverpod
          - cinder_bloc
          - cinder_material_icons
          - cinder_lucide
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: dart pub get
      - name: Check formatting of changed package files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base="$BASE_SHA"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          fi
          prefix="packages/${{ matrix.package }}/"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base" HEAD | grep -E "^${prefix}.*\.dart$" || true)
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
            git diff --exit-code -- "${files[@]}"
          else
            echo "No changed Dart files in ${{ matrix.package }}."
          fi
      - name: Analyze
        working-directory: packages/${{ matrix.package }}
        run: dart analyze --fatal-infos
      - name: Test when present
        working-directory: packages/${{ matrix.package }}
        run: |
          if find test -name '*_test.dart' -print -quit 2>/dev/null | grep -q .; then
            dart test --reporter expanded
          else
            echo "No tests in ${{ matrix.package }}"
          fi
