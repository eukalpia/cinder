name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test example benchmark
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test
        run: dart test --reporter expanded

  packages:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - cinder_nested
          - cinder_provider
          - cinder_riverpod
          - cinder_bloc
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: dart pub get
      - name: Check formatting
        working-directory: packages/${{ matrix.package }}
        run: |
          paths="lib"
          [ -d test ] && paths="$paths test"
          [ -d example ] && paths="$paths example"
          dart format --output=none --set-exit-if-changed $paths
      - name: Analyze
        working-directory: packages/${{ matrix.package }}
        run: dart analyze --fatal-infos
      - name: Test when present
        working-directory: packages/${{ matrix.package }}
        run: |
          if find test -name '*_test.dart' -print -quit 2>/dev/null | grep -q .; then
            dart test --reporter expanded
          else
            echo "No tests in ${{ matrix.package }}"
          fi
