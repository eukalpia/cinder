name: Toolchain Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve external dependencies
        run: |
          mkdir -p /tmp/cinder-toolchain
          cat > /tmp/cinder-toolchain/pubspec.yaml <<'EOF'
          name: cinder_toolchain
          publish_to: none
          environment:
            sdk: '>=3.7.0 <4.0.0'
          dependencies:
            bloc: ^9.2.1
            riverpod: ^3.3.2
            meta: ^1.17.0
          dev_dependencies:
            lints: ^5.0.0
            test: ^1.25.6
          EOF
          cd /tmp/cinder-toolchain
          dart pub get
      - name: Pack Dart SDK and pub cache
        run: |
          DART_BIN="$(readlink -f "$(command -v dart)")"
          DART_ROOT="$(dirname "$(dirname "$DART_BIN")")"
          tar -C "$(dirname "$DART_ROOT")" -czf /tmp/dart-sdk.tar.gz "$(basename "$DART_ROOT")"
          tar -C "$HOME" -czf /tmp/pub-cache.tar.gz .pub-cache
      - uses: actions/upload-artifact@v7
        with:
          name: dart-sdk
          path: /tmp/dart-sdk.tar.gz
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: pub-cache
          path: /tmp/pub-cache.tar.gz
          retention-days: 1
