name: Toolchain Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Pack Dart SDK
        run: |
          DART_BIN="$(readlink -f "$(command -v dart)")"
          DART_ROOT="$(dirname "$(dirname "$DART_BIN")")"
          tar -C "$(dirname "$DART_ROOT")" -czf /tmp/dart-sdk.tar.gz "$(basename "$DART_ROOT")"
      - uses: actions/upload-artifact@v7
        with:
          name: dart-sdk
          path: /tmp/dart-sdk.tar.gz
          retention-days: 1
