name: Toolchain Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve maintained package dependencies
        run: |
          dart pub get
          for package in cinder_nested cinder_provider cinder_riverpod cinder_bloc cinder_material_icons cinder_lucide; do
            cat > "packages/$package/pubspec_overrides.yaml" <<EOF
          dependency_overrides:
            cinder:
              path: ../..
          EOF
            (cd "packages/$package" && dart pub get)
          done
      - name: Pack Dart SDK and pub cache
        run: |
          DART_BIN="$(readlink -f "$(command -v dart)")"
          DART_ROOT="$(dirname "$(dirname "$DART_BIN")")"
          tar -C "$(dirname "$DART_ROOT")" -czf /tmp/dart-sdk.tar.gz "$(basename "$DART_ROOT")"
          tar -C "$HOME" -czf /tmp/pub-cache.tar.gz .pub-cache
      - uses: actions/upload-artifact@v7
        with:
          name: dart-sdk
          path: /tmp/dart-sdk.tar.gz
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: pub-cache
          path: /tmp/pub-cache.tar.gz
          retention-days: 1
