name: Apply Renderer Production Release

on:
  push:
    branches: [feature/renderer-production]
    paths:
      - '.github/workflows/apply_renderer_production.yml'
      - '.github/release_payload/**'

permissions:
  contents: write

concurrency:
  group: renderer-production-apply
  cancel-in-progress: true

jobs:
  apply-validate-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/renderer-production
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Apply production payloads
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import base64
          import gzip
          import io
          import subprocess
          import tarfile
          from pathlib import Path

          root = Path.cwd().resolve()
          payload = root / '.github' / 'release_payload'
          temp = Path('/tmp/cinder-renderer-production')
          temp.mkdir(parents=True, exist_ok=True)

          def decode(path: Path) -> bytes:
              return gzip.decompress(base64.b64decode(path.read_text(encoding='utf-8')))

          def apply_patch(name: str, source: Path) -> None:
              patch = temp / name
              patch.write_bytes(decode(source))
              subprocess.run(
                  ['git', 'apply', '--check', '--whitespace=nowarn', str(patch)],
                  cwd=root,
                  check=True,
              )
              subprocess.run(
                  ['git', 'apply', '--whitespace=nowarn', str(patch)],
                  cwd=root,
                  check=True,
              )

          def extract_tar(source: Path) -> None:
              raw = decode(source)
              with tarfile.open(fileobj=io.BytesIO(raw), mode='r:') as archive:
                  for member in archive.getmembers():
                      destination = (root / member.name).resolve()
                      if root not in destination.parents and destination != root:
                          raise RuntimeError(f'Unsafe archive path: {member.name}')
                  archive.extractall(root, filter='data')

          apply_patch('phase23.patch', payload / 'phase23.b64')
          extract_tar(payload / 'icons.b64')
          apply_patch('image-docs.patch', payload / 'image_docs_patch.b64')
          extract_tar(payload / 'docs.b64')
          PY

      - name: Generate complete Material and Lucide catalogs
        run: python3 tool/generate_icon_packs.py

      - name: Resolve dependencies
        shell: bash
        run: |
          dart pub get
          for package in \
            cinder_nested \
            cinder_provider \
            cinder_riverpod \
            cinder_bloc \
            cinder_material_icons \
            cinder_lucide; do
            (cd "packages/$package" && dart pub get)
          done

      - name: Format production Dart files
        shell: bash
        run: |
          dart format \
            lib/src/buffer.dart \
            lib/src/rendering/frame_diff.dart \
            lib/src/framework/terminal_canvas.dart \
            lib/src/framework/render_object.dart \
            lib/src/binding/terminal_binding.dart \
            lib/src/components/repaint_boundary.dart \
            lib/src/components/list_view.dart \
            lib/src/components/image.dart \
            lib/src/components/icon.dart \
            lib/src/image \
            test/rendering \
            test/image \
            test/components/icon_test.dart \
            benchmark/renderer_v2_benchmark.dart \
            benchmark/renderer_v2_layers_benchmark.dart \
            example/icons_demo.dart \
            packages/cinder_material_icons/lib \
            packages/cinder_material_icons/test \
            packages/cinder_lucide/lib \
            packages/cinder_lucide/test

      - name: Analyze root package
        run: dart analyze --fatal-infos

      - name: Run renderer, image, and icon contracts
        run: >-
          dart test
          test/rendering/buffer_v2_test.dart
          test/rendering/frame_diff_test.dart
          test/rendering/repaint_boundary_test.dart
          test/rendering/scroll_region_test.dart
          test/image/image_pipeline_test.dart
          test/components/icon_test.dart
          --reporter expanded

      - name: Run complete root suite
        run: dart test --reporter expanded

      - name: Analyze and test integration packages
        shell: bash
        run: |
          for package in \
            cinder_nested \
            cinder_provider \
            cinder_riverpod \
            cinder_bloc \
            cinder_material_icons \
            cinder_lucide; do
            echo "::group::$package"
            (
              cd "packages/$package"
              dart analyze --fatal-infos
              if find test -name '*_test.dart' -print -quit 2>/dev/null | grep -q .; then
                dart test --reporter expanded
              fi
            )
            echo "::endgroup::"
          done

      - name: Run renderer benchmarks
        shell: bash
        run: |
          dart run benchmark/renderer_v2_benchmark.dart
          dart run benchmark/renderer_v2_layers_benchmark.dart

      - name: Commit validated production sources
        shell: bash
        run: |
          git config user.name "Cinder Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            CHANGELOG.md \
            README.md \
            melos.yaml \
            lib \
            test \
            benchmark \
            example \
            doc \
            packages/cinder_material_icons \
            packages/cinder_lucide \
            tool/generate_icon_packs.py
          if git diff --cached --quiet; then
            echo "No production changes to commit."
            exit 0
          fi
          git commit -m "feat!: ship production renderer, icons, and images"
          git push origin HEAD:feature/renderer-production

      - name: Capture failure state
        if: failure()
        shell: bash
        run: |
          git status --short > /tmp/renderer-production-status.txt
          git diff --stat > /tmp/renderer-production-diff.txt

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: renderer-production-failure
          path: |
            /tmp/renderer-production-status.txt
            /tmp/renderer-production-diff.txt
