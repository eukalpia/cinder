name: Verify Patch Chunks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify finalized chunks and archive
        run: |
          set -euo pipefail
          echo 'cbb133c8b489ee850725b4ef6c7bfabb156753d96048968c0dfa72e0a70e2e68  .github/patch2/chunk00' | sha256sum -c -
          echo 'b60b7f02191ad4327d9fa42090a150a85a9a6381ccd48aff83128c256ed516ed  .github/patch2/chunk01' | sha256sum -c -
          echo 'cb3b7ce6486373cc77cb6726354f94b4a8d34ec7f5c1f77a2e19d6a30294d46e  .github/patch2/chunk02' | sha256sum -c -
          echo 'e2ef563e321dad708e3dbf180dff965b94459e6258700256dd97999deaba6101  .github/patch2/chunk03a' | sha256sum -c -
          echo '7cb9d1b416b891524d1b488ebc5ebb18cbbdeac696e58a29b95962d6402b9992  .github/patch2/chunk03b' | sha256sum -c -
          echo 'f571641ae08f91d219cd215033b9b6070ce0ad190b80d324de5692b4a9032c11  .github/patch2/chunk04a' | sha256sum -c -
          echo '22a8ff426f595d4ec97a6ad9cdbe2689e85d2c14475c9590a121b1b26871476a  .github/patch2/chunk04b' | sha256sum -c -
          echo '72406abd5f62c848612b59b8f0ea5f1137a411ce4da136641ca0c7c967a1b719  .github/patch2/chunk05a' | sha256sum -c -
          echo '8de25adb91c633dc06b766e8916b57ba4c5d96f23a36c5750d76136d598e41ab  .github/patch2/chunk05b' | sha256sum -c -
          cat .github/patch2/chunk00 .github/patch2/chunk01 .github/patch2/chunk02 .github/patch2/chunk03a .github/patch2/chunk03b .github/patch2/chunk04a .github/patch2/chunk04b .github/patch2/chunk05a .github/patch2/chunk05b > /tmp/cinder.patch.gz.b64
          echo '948694aae2011c2d9c7ec95b153f78ea4a4c3bd2f9c08eed36b97d6b2e0abf6b  /tmp/cinder.patch.gz.b64' | sha256sum -c -
