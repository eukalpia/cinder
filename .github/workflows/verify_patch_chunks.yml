name: Verify Patch Chunks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build integrity report
        run: |
          set -euo pipefail
          sha256sum .github/patch2/chunk00 .github/patch2/chunk01 .github/patch2/chunk02 .github/patch2/chunk03a .github/patch2/chunk03b .github/patch2/chunk04a .github/patch2/chunk04b .github/patch2/chunk05a .github/patch2/chunk05b > /tmp/hashes.txt
          wc -c .github/patch2/chunk00 .github/patch2/chunk01 .github/patch2/chunk02 .github/patch2/chunk03a .github/patch2/chunk03b .github/patch2/chunk04a .github/patch2/chunk04b .github/patch2/chunk05a .github/patch2/chunk05b >> /tmp/hashes.txt
          cat .github/patch2/chunk00 .github/patch2/chunk01 .github/patch2/chunk02 .github/patch2/chunk03a .github/patch2/chunk03b .github/patch2/chunk04a .github/patch2/chunk04b .github/patch2/chunk05a .github/patch2/chunk05b > /tmp/cinder.patch.gz.b64
          sha256sum /tmp/cinder.patch.gz.b64 >> /tmp/hashes.txt
          wc -c /tmp/cinder.patch.gz.b64 >> /tmp/hashes.txt
      - uses: actions/upload-artifact@v7
        with:
          name: patch-integrity
          path: /tmp/hashes.txt
          retention-days: 1
