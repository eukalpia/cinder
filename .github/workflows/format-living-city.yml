name: Format living city

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/format-living-city.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve package language version
        run: dart pub get
      - name: Format living city
        run: |
          git pull --ff-only origin feature/cinder-web-city-runtime
          dart format example/web_showcase.dart
      - name: Commit formatter output
        run: |
          if git diff --quiet -- example/web_showcase.dart; then
            echo "Living city is already formatted."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add example/web_showcase.dart
            git commit -m "style(web): format living electric city"
            git push origin HEAD:feature/cinder-web-city-runtime
          fi
      - name: Analyze formatted city
        run: dart analyze --fatal-infos
