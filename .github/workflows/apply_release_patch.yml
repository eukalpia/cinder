name: Apply Release Source Patch

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli
          fetch-depth: 0
      - name: Reconstruct and verify source patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/patch2/chunk05a')
          data = bytearray(path.read_bytes())
          assert len(data) == 6000
          assert data[3770] == ord('d')
          data[3770] = ord('f')
          path.write_bytes(data)
          PY
          cat .github/patch2/chunk00 .github/patch2/chunk01 .github/patch2/chunk02 .github/patch2/chunk03a .github/patch2/chunk03b .github/patch2/chunk04a .github/patch2/chunk04b .github/patch2/chunk05a .github/patch2/chunk05b > /tmp/cinder.patch.gz.b64
          echo '948694aae2011c2d9c7ec95b153f78ea4a4c3bd2f9c08eed36b97d6b2e0abf6b  /tmp/cinder.patch.gz.b64' | sha256sum -c -
          base64 --decode /tmp/cinder.patch.gz.b64 > /tmp/cinder.patch.gz
          echo '12614ff242c5eeadcee5ce2f897ddecf89a6ef92d96dd161e1d11f7077f15b59  /tmp/cinder.patch.gz' | sha256sum -c -
          gzip --decompress --stdout /tmp/cinder.patch.gz > /tmp/cinder.patch
          echo 'a3c76c5ece36bd4e07bb969bf411080177cbbdf4eb2bf2e3370f05e9181ff511  /tmp/cinder.patch' | sha256sum -c -
          git apply --check /tmp/cinder.patch
      - name: Prepare clean source commit
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/cinder.patch
          rm -rf .github/patch .github/patch2
          rm -f .github/workflows/apply_release_patch.yml
          rm -f .github/workflows/source_snapshot.yml
          rm -f .github/workflows/toolchain_snapshot.yml
          rm -f .github/workflows/verify_patch_chunks.yml
          rm -f .tree-probe
          git fetch origin main
          git reset --soft origin/main
          git add -A
          git config user.name 'Cinder Maintainers'
          git config user.email 'maintainers@cinder.dev'
          git commit -m 'feat: add media, data visualization, and CLI tooling'
          git rev-parse HEAD > /tmp/clean-commit.txt
          tar --exclude=.git --exclude=.dart_tool --exclude=build -czf /tmp/clean-source.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: clean-source
          path: |
            /tmp/clean-commit.txt
            /tmp/clean-source.tar.gz
          retention-days: 1
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        run: dart pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test packages/cinder_cli/lib packages/cinder_cli/bin packages/cinder_cli/test
      - name: Analyze core
        run: dart analyze --fatal-infos
      - name: Test core
        run: dart test --reporter expanded
      - name: Validate core package archive
        run: dart pub publish --dry-run
      - name: Validate CLI package
        working-directory: packages/cinder_cli
        run: |
          dart pub get
          dart analyze --fatal-infos
          dart test --reporter expanded
          dart pub publish --dry-run
      - name: Publish clean commit
        run: git push --force origin HEAD:feature/media-data-release
