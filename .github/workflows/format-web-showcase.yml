name: Format Web Showcase

on:
  push:
    branches:
      - feature/web-docs-lab
    paths:
      - 'example/web_showcase.dart'
      - '.github/workflows/format-web-showcase.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/web-docs-lab
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Format source
        run: dart format example/web_showcase.dart
      - name: Commit formatter output
        shell: bash
        run: |
          if git diff --quiet -- example/web_showcase.dart; then
            echo 'Source is already formatted.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add example/web_showcase.dart
          git commit -m 'style(example): format web showcase'
          git push origin HEAD:feature/web-docs-lab
