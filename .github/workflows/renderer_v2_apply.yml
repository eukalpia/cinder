name: Apply Renderer V2

on:
  pull_request:
    branches: [main]
    paths:
      - 'lib/src/buffer.dart'
      - 'lib/src/framework/terminal_canvas.dart'
      - 'lib/src/binding/terminal_binding.dart'
      - '.github/scripts/apply_renderer_v2.py'
      - '.github/workflows/renderer_v2_apply.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-renderer-v2
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply migration
        run: python3 .github/scripts/apply_renderer_v2.py
      - name: Format sources
        run: dart format lib/src/buffer.dart lib/src/framework/terminal_canvas.dart lib/src/binding/terminal_binding.dart
      - name: Install dependencies
        run: dart pub get
      - name: Analyze renderer sources
        run: dart analyze lib/src/buffer.dart lib/src/framework/terminal_canvas.dart lib/src/binding/terminal_binding.dart
      - name: Commit applied renderer
        run: |
          git config user.name "Cinder CI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib/src/buffer.dart lib/src/framework/terminal_canvas.dart lib/src/binding/terminal_binding.dart
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit --no-verify -m "perf: enable Renderer V2 reusable dirty-span pipeline"
          git push origin HEAD:dev
