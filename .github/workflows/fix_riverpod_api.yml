name: Finalize Cinder Riverpod adapter

on:
  push:
    branches: [dev]
    paths:
      - '.github/workflows/fix_riverpod_api.yml'

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply Riverpod adapter fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          framework = Path('packages/cinder_riverpod/lib/src/framework.dart')
          text = framework.read_text(encoding='utf-8')
          text = text.replace(
              "import 'package:cinder/cinder.dart';\nimport 'package:riverpod/src/internals.dart';",
              "import 'package:cinder/cinder.dart';\nimport 'package:meta/meta.dart';\nimport 'package:riverpod/src/internals.dart';",
          )
          text = text.replace(
              '  ProviderScopeElement(InheritedWidget super.widget);',
              '  ProviderScopeElement(super.widget);',
          )
          text = text.replace(
              "  @override\n  _InheritedProviderScope get widget => super.widget as _InheritedProviderScope;\n\n  ProviderContainer get container => widget.container;",
              "  _InheritedProviderScope get _scopeWidget =>\n      super.widget as _InheritedProviderScope;\n\n  ProviderContainer get container => _scopeWidget.container;",
          )
          framework.write_text(text, encoding='utf-8')

          for relative in [
              'packages/cinder_riverpod/lib/src/provider_context.dart',
              'packages/cinder_riverpod/lib/src/provider_dependencies.dart',
          ]:
              path = Path(relative)
              text = path.read_text(encoding='utf-8')
              marker = '// Riverpod 3 keeps the listenable type hierarchy internal.\n'
              ignore = '// ignore_for_file: implementation_imports, invalid_use_of_internal_member\n\n'
              if not text.startswith(marker):
                  text = marker + ignore + text
              text = text.replace(
                  "import 'package:riverpod/riverpod.dart';",
                  "import 'package:riverpod/src/internals.dart';",
              )
              path.write_text(text, encoding='utf-8')
          PY
      - name: Format
        run: dart format packages/cinder_riverpod/lib
      - name: Install dependencies
        working-directory: packages/cinder_riverpod
        run: dart pub get
      - name: Analyze with fatal infos
        working-directory: packages/cinder_riverpod
        run: dart analyze --fatal-infos
      - name: Test
        working-directory: packages/cinder_riverpod
        run: dart test --reporter expanded
      - name: Commit
        run: |
          git config user.name "Cinder Riverpod Bot"
          git config user.email "actions@users.noreply.github.com"
          git add packages/cinder_riverpod/lib
          git commit --no-verify -m "fix: finalize Cinder Riverpod adapter boundary"
          git push origin HEAD:dev
