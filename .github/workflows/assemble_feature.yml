name: Assemble Feature

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: assemble-media-data-cli
  cancel-in-progress: true

jobs:
  assemble:
    if: github.event.pull_request.head.ref == 'feature/media-data-cli-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - name: Import product sources
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/media-data-cli
          files=(
            lib/cinder.dart
            lib/src/media/media.dart
            lib/src/data/data_grid.dart
            lib/src/data/charts.dart
            packages/cinder_cli/lib/src/commands/create_command.dart
            packages/cinder_cli/lib/src/commands/doctor_command.dart
            packages/cinder_cli/lib/src/commands/version_command.dart
            packages/cinder_cli/lib/src/runner.dart
            pubspec.yaml
            test/media_controller_test.dart
            test/data_widgets_test.dart
          )
          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            git show "origin/feature/media-data-cli:$file" > "$file"
          done

          cat > packages/cinder_cli/pubspec.yaml <<'YAML'
          name: cinder_cli
          description: Command-line tools and project scaffolding for the Cinder terminal UI framework.
          version: 1.0.0-dev.3
          repository: https://github.com/eukalpia/cinder
          issue_tracker: https://github.com/eukalpia/cinder/issues

          environment:
            sdk: ">=3.5.0 <4.0.0"

          dependencies:
            args: ^2.7.0
            file: ^7.0.1
            meta: ^1.17.0
            path: ^1.9.0
            cinder: ^1.0.0-dev.3
            scoped_deps: ^0.1.0+2

          dev_dependencies:
            lints: ^5.0.0
            mocktail: ^1.0.4
            test: ^1.25.6

          executables:
            cinder: cinder_cli.dart

          topics:
            - tui
            - cli
            - terminal
            - scaffolding
          YAML
          sed -i 's/^          //' packages/cinder_cli/pubspec.yaml

          cat > packages/cinder_cli/pubspec_overrides.yaml <<'YAML'
          dependency_overrides:
            cinder:
              path: ../..
          YAML
          sed -i 's/^          //' packages/cinder_cli/pubspec_overrides.yaml

      - name: Correct imported source contracts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          charts = Path('lib/src/data/charts.dart')
          text = charts.read_text().replace(
              "final maximum = values.map((v) => v.abs()).fold<double>(0, math.max);",
              "final maximum = values.map((value) => value.abs().toDouble()).fold<double>(0, (current, value) => math.max(current, value));",
          )
          charts.write_text(text)

          media = Path('lib/src/media/media.dart')
          text = media.read_text().replace(
              'T? get firstOrNull => isEmpty ? null : first;',
              'T? get firstOrNull => this.isEmpty ? null : first;',
          )
          media.write_text(text)

          create = Path('packages/cinder_cli/lib/src/commands/create_command.dart')
          text = create.read_text().replace(
              'sdk: \\"\\>=3.5.0 <4.0.0\\"',
              'sdk: ">=3.5.0 <4.0.0"',
          )
          create.write_text(text)

          doctor = Path('packages/cinder_cli/lib/src/commands/doctor_command.dart')
          text = doctor.read_text().replace(
              '        if (required) failures++;',
              '        if (required) {\n          failures++;\n        }',
          )
          doctor.write_text(text)
          PY

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Validate root package
        shell: bash
        run: |
          set -euo pipefail
          dart pub get
          dart fix --apply
          dart format lib/cinder.dart lib/src/media lib/src/data test/media_controller_test.dart test/data_widgets_test.dart
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart test/data_widgets_test.dart

      - name: Validate CLI package
        shell: bash
        run: |
          set -euo pipefail
          cd packages/cinder_cli
          dart pub get
          dart format lib bin test
          dart analyze --fatal-infos
          dart test
          dart run bin/cinder_cli.dart version
          temp_dir="$(mktemp -d)"
          dart run bin/cinder_cli.dart create "$temp_dir/sample_app"
          test -f "$temp_dir/sample_app/pubspec.yaml"
          test -f "$temp_dir/sample_app/bin/sample_app.dart"

      - name: Commit clean feature
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/assemble_feature.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add media, data visualization, and project CLI"
          git push origin HEAD:feature/media-data-cli-clean
