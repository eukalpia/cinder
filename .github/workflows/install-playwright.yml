name: Install Playwright Test Tooling

on:
  push:
    branches:
      - feature/web-docs-lab
    paths:
      - '.github/workflows/install-playwright.yml'

permissions:
  contents: write

jobs:
  install:
    name: Install pinned browser test dependency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/web-docs-lab
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install pinned Playwright test package
        working-directory: docs-site
        run: npm install --save-dev --save-exact @playwright/test@1.61.1
      - name: Commit dependencies and remove this one-shot workflow
        shell: bash
        run: |
          rm -f .github/workflows/install-playwright.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs-site/package.json docs-site/package-lock.json .github/workflows/install-playwright.yml
          git commit -m 'test(web): add pinned Playwright browser tooling'
          git push origin HEAD:feature/web-docs-lab
