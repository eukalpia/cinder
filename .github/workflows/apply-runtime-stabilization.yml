name: Apply runtime stabilization

on:
  push:
    branches:
      - stabilization/runtime-input-unicode
    paths:
      - .github/workflows/apply-runtime-stabilization.yml
      - .stabilization/**

permissions:
  contents: write

concurrency:
  group: apply-runtime-stabilization
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: stabilization/runtime-input-unicode
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Reconstruct and verify product payload
        shell: bash
        run: |
          set -euo pipefail
          cat .stabilization/chunk-* | base64 --decode > /tmp/cinder-stabilization-product.tar.gz
          echo "db4f4967763a5ecbebfd130cd7190795ed84f093dd46db997d7c90d619a71199  /tmp/cinder-stabilization-product.tar.gz" | sha256sum -c -
          tar -xzf /tmp/cinder-stabilization-product.tar.gz
          rm -rf .stabilization
          rm -f .github/workflows/apply-runtime-stabilization.yml
          rm -f .github/workflows/export-stabilization-source.yml
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
      - name: Install dependencies
        run: dart pub get
      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main -- '*.dart')
          if [ "${#files[@]}" -gt 0 ]; then
            dart format --output=none --set-exit-if-changed "${files[@]}"
          fi
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test
        run: dart test --reporter compact
      - name: Runtime stability benchmark
        run: dart run benchmark/benchmark.dart runtime
      - name: Verify clean product diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test ! -e .stabilization
          test ! -e .github/workflows/apply-runtime-stabilization.yml
          test ! -e .github/workflows/export-stabilization-source.yml
          if git diff --name-only origin/main | grep -E '^\.github/workflows/(apply-runtime-stabilization|export-stabilization-source)\.yml$'; then
            echo 'Temporary workflow leaked into product diff.' >&2
            exit 1
          fi
      - name: Commit validated product tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Stabilize runtime, input, Unicode, and terminal capabilities'
          git push origin HEAD:stabilization/runtime-input-unicode
