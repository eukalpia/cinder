name: Format Feature Sources

on:
  push:
    branches:
      - feature/media-data-cli

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Format changed Dart sources
        run: |
          mapfile -t files < <(git diff --name-only origin/main...HEAD -- '*.dart')
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
          fi
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "Cinder CI"
          git config user.email "actions@users.noreply.github.com"
          git add -- '*.dart'
          git commit -m "style: format feature sources"
          git push origin HEAD:feature/media-data-cli
