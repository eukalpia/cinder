name: Apply Media Runtime Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feature/media-data-cli-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Extract and apply checked patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/fix_media_runtime.yml').read_text()
          marker = "python3 - <<'PY'\n"
          block = workflow.split(marker, 1)[1].split('\n          PY', 1)[0]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/media_patch.py').write_text('\n'.join(lines) + '\n')
          PY
          python3 /tmp/media_patch.py
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/src/media/media.dart')
          text = path.read_text()
          text = text.replace(
              '  Future<void> close();\n\n  Future<void> dispose() => close();\n}',
              '  Future<void> close();\n}',
              1,
          )
          text = text.replace(
              '    unawaited(backend.dispose());',
              '    unawaited(backend.close());',
              1,
          )
          text = text.replace(
              '            @override\n            Future<void> dispose() async {',
              '            Future<void> dispose() async {',
              1,
          )
          path.write_text(text)
          PY

      - name: Resolve dependencies
        run: dart pub get

      - name: Format media source
        run: dart format lib/src/media/media.dart

      - name: Analyze repository
        run: dart analyze --fatal-infos

      - name: Test media controller
        run: dart test test/media_controller_test.dart

      - name: Commit clean fix
        run: |
          rm .github/workflows/fix_media_runtime.yml
          rm .github/workflows/apply_media_runtime_pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): stop orphan audio and pace video frames"
          git push origin HEAD:feature/media-data-cli-clean
