name: Finalize Media Player

on:
  push:
    branches:
      - feature/media-data-cli-clean

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Apply media runtime fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          media = Path('lib/src/media/media.dart')
          text = media.read_text()
          old = """            '-nodisp',
            '-autoexit',
            '-nostdin',
            '-loglevel',
"""
          new = """            '-nodisp',
            '-autoexit',
            '-loglevel',
"""
          if old in text:
              text = text.replace(old, new, 1)
          media.write_text(text)

          image = Path('lib/src/components/image.dart')
          text = image.read_text()
          old = """  set imageData(ImageData value) {
    if (_imageData == value) return;
    _imageData = value;
    _cachedEncodedData = null;
    _cachedScaledImage = null;
    _cachedBlockCells = null;
    _kittyImageId = null; // Reset so new ID is generated on next paint
    markNeedsLayout();
  }
"""
          new = """  set imageData(ImageData value) {
    if (identical(_imageData, value)) return;
    final geometryChanged =
        _imageData.width != value.width || _imageData.height != value.height;
    _imageData = value;
    _cachedEncodedData = null;
    _cachedScaledImage = null;
    _cachedBlockCells = null;
    _cachedPalette = null;
    _cachedIndexedPixels = null;
    _kittyImageId = null;
    if (geometryChanged) {
      markNeedsLayout();
    } else {
      markNeedsPaint();
    }
  }
"""
          if old not in text:
              raise SystemExit('RenderImage.imageData setter was not found')
          image.write_text(text.replace(old, new, 1))

          player = Path('lib/src/media/media_player.dart')
          text = player.read_text()
          text = text.replace(
              "final bar = '[${'='.padRight(filled, '=')}${''.padRight(empty, '-')}]';",
              "final bar = '[${''.padRight(filled, '=')}${''.padRight(empty, '-')}]';",
              1,
          )
          player.write_text(text)
          PY

      - name: Resolve dependencies
        run: dart pub get

      - name: Format changed Dart files
        run: |
          dart format \
            lib/cinder.dart \
            lib/src/components/image.dart \
            lib/src/media/media.dart \
            lib/src/media/media_player.dart

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test media
        run: dart test test/media_controller_test.dart --reporter expanded

      - name: Commit clean product changes
        run: |
          git checkout origin/main -- .github/workflows/benchmark.yml
          rm -f .github/workflows/fix_ffplay_arguments.yml
          rm -f .github/workflows/finalize_media_player.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(media): add responsive player controls and direct frame rendering"
          git push origin HEAD:feature/media-data-cli-clean
