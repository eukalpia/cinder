name: Graphics and Icons

on:
  push:
    branches: [dev, test, main]
    paths:
      - 'lib/src/components/icon.dart'
      - 'lib/src/components/image.dart'
      - 'lib/src/image/**'
      - 'lib/src/media/**'
      - 'example/media_player.dart'
      - 'packages/cinder_material_icons/**'
      - 'packages/cinder_lucide/**'
      - 'test/components/icon_test.dart'
      - 'test/image/**'
      - 'tool/generate_icon_packs.py'
      - '.github/workflows/graphics.yml'
  pull_request:
    branches: [dev, test, main]
    paths:
      - 'lib/src/components/icon.dart'
      - 'lib/src/components/image.dart'
      - 'lib/src/image/**'
      - 'lib/src/media/**'
      - 'example/media_player.dart'
      - 'packages/cinder_material_icons/**'
      - 'packages/cinder_lucide/**'
      - 'test/components/icon_test.dart'
      - 'test/image/**'
      - 'tool/generate_icon_packs.py'
      - '.github/workflows/graphics.yml'

concurrency:
  group: graphics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format_media_player:
    name: Format media player feature
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/media-player-controls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-player-controls
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply runtime fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          media = Path('lib/src/media/media.dart')
          text = media.read_text()
          old = """            '-nodisp',
            '-autoexit',
            '-nostdin',
            '-loglevel',
"""
          new = """            '-nodisp',
            '-autoexit',
            '-loglevel',
"""
          if old in text:
              text = text.replace(old, new, 1)
          media.write_text(text)

          image = Path('lib/src/components/image.dart')
          text = image.read_text()
          old = """  set imageData(ImageData value) {
    if (_imageData == value) return;
    _imageData = value;
    _cachedEncodedData = null;
    _cachedScaledImage = null;
    _cachedBlockCells = null;
    _kittyImageId = null; // Reset so new ID is generated on next paint
    markNeedsLayout();
  }
"""
          new = """  set imageData(ImageData value) {
    if (identical(_imageData, value)) return;
    final geometryChanged =
        _imageData.width != value.width || _imageData.height != value.height;
    _imageData = value;
    _cachedEncodedData = null;
    _cachedScaledImage = null;
    _cachedBlockCells = null;
    _cachedPalette = null;
    _cachedIndexedPixels = null;
    _kittyImageId = null;
    if (geometryChanged) {
      markNeedsLayout();
    } else {
      markNeedsPaint();
    }
  }
"""
          if old in text:
              text = text.replace(old, new, 1)
          image.write_text(text)
          PY
      - name: Resolve dependencies
        run: dart pub get
      - name: Format sources
        run: |
          dart format \
            lib/cinder.dart \
            lib/src/components/image.dart \
            lib/src/media/media.dart \
            lib/src/media/media_player.dart \
            lib/src/media/ffmpeg_process_backend.dart \
            example/media_player.dart
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test media
        run: dart test test/media_controller_test.dart --reporter expanded
      - name: Commit formatted product files
        run: |
          rm -f .github/workflows/format_media_player.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes required."
          else
            git commit -m "feat(media): finalize interactive player runtime"
            git push origin HEAD:feature/media-player-controls
          fi

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        run: |
          dart pub get
          (cd packages/cinder_material_icons && dart pub get)
          (cd packages/cinder_lucide && dart pub get)
      - name: Analyze graphics APIs
        run: |
          dart analyze --fatal-infos lib/src/components/icon.dart lib/src/components/image.dart lib/src/image test/components/icon_test.dart test/image
          (cd packages/cinder_material_icons && dart analyze --fatal-infos)
          (cd packages/cinder_lucide && dart analyze --fatal-infos)
      - name: Run graphics tests
        run: |
          dart test test/components/icon_test.dart test/image --reporter expanded
          (cd packages/cinder_material_icons && dart test --reporter expanded)
          (cd packages/cinder_lucide && dart test --reporter expanded)
