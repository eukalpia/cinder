name: Renderer V2

on:
  push:
    branches: [dev, test, main]
    paths:
      - 'lib/src/buffer.dart'
      - 'lib/src/rendering/frame_diff.dart'
      - 'lib/src/framework/terminal_canvas.dart'
      - 'lib/src/framework/render_object.dart'
      - 'lib/src/binding/terminal_binding.dart'
      - 'lib/src/components/repaint_boundary.dart'
      - 'lib/src/components/list_view.dart'
      - 'lib/src/components/image.dart'
      - 'lib/src/image/**'
      - 'lib/src/utils/escape_codes.dart'
      - 'test/rendering/**'
      - 'test/image/**'
      - 'benchmark/renderer_v2_benchmark.dart'
      - 'benchmark/renderer_v2_layers_benchmark.dart'
      - '.github/workflows/renderer_v2.yml'
  pull_request:
    branches: [dev, test, main]
    paths:
      - 'lib/src/buffer.dart'
      - 'lib/src/rendering/frame_diff.dart'
      - 'lib/src/framework/terminal_canvas.dart'
      - 'lib/src/framework/render_object.dart'
      - 'lib/src/binding/terminal_binding.dart'
      - 'lib/src/components/repaint_boundary.dart'
      - 'lib/src/components/list_view.dart'
      - 'lib/src/components/image.dart'
      - 'lib/src/image/**'
      - 'lib/src/utils/escape_codes.dart'
      - 'test/rendering/**'
      - 'test/image/**'
      - 'benchmark/renderer_v2_benchmark.dart'
      - 'benchmark/renderer_v2_layers_benchmark.dart'
      - '.github/workflows/renderer_v2.yml'

concurrency:
  group: renderer-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Analyze Renderer V2
        run: >-
          dart analyze
          lib/src/buffer.dart
          lib/src/rendering/frame_diff.dart
          lib/src/framework/terminal_canvas.dart
          lib/src/framework/render_object.dart
          lib/src/binding/terminal_binding.dart
          lib/src/components/repaint_boundary.dart
          lib/src/components/list_view.dart
          lib/src/components/image.dart
          lib/src/image
          lib/src/utils/escape_codes.dart
          test/rendering
          test/image
          benchmark/renderer_v2_benchmark.dart
          benchmark/renderer_v2_layers_benchmark.dart
      - name: Renderer correctness and contracts
        run: >-
          dart test
          test/rendering/buffer_v2_test.dart
          test/rendering/frame_diff_test.dart
          test/rendering/repaint_boundary_test.dart
          test/rendering/scroll_region_test.dart
          test/image/image_pipeline_test.dart
          --reporter expanded
      - name: Renderer microbenchmarks
        run: |
          dart run benchmark/renderer_v2_benchmark.dart
          dart run benchmark/renderer_v2_layers_benchmark.dart
