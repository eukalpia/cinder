name: Fix city bootstrap sizing

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/fix-city-bootstrap.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Fix the first embedded frame
        run: |
          python3 - <<'PY'
          from pathlib import Path

          terminal_path = Path('docs-site/src/components/web-terminal.tsx')
          terminal = terminal_path.read_text()
          old = '''        terminal.loadAddon(fitAddon);
        terminal.open(host);
        terminalRef.current = terminal;
'''
          new = '''        terminal.loadAddon(fitAddon);
        terminal.open(host);
        try {
          fitAddon.fit();
        } catch {
          // The delayed ResizeObserver pass retries once layout settles.
        }
        terminalRef.current = terminal;
'''
          if old not in terminal:
              raise SystemExit('Expected terminal bootstrap block was not found.')
          terminal_path.write_text(terminal.replace(old, new, 1))

          city_path = Path('example/web_showcase.dart')
          city = city_path.read_text()
          old = '''          Container(
            width: width.toDouble(),
            decoration: BoxDecoration(
'''
          new = '''          Container(
            decoration: BoxDecoration(
'''
          if old not in city:
              raise SystemExit('Expected compact header width was not found.')
          city_path.write_text(city.replace(old, new, 1))
          PY
      - name: Validate changes
        run: |
          dart pub get
          dart format example/web_showcase.dart
          dart analyze --fatal-infos
          cd docs-site
          npm ci
          npm run lint
          npm run typecheck
      - name: Commit bootstrap fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart docs-site/src/components/web-terminal.tsx
          git commit -m "fix(web): size embedded runtime before Cinder boots"
          git push origin HEAD:feature/cinder-web-city-runtime
