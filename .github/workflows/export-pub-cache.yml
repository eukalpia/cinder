name: Export Dart dependencies

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/export-pub-cache.yml

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Archive dependency cache
        run: |
          tar -C "$PUB_CACHE" -czf /tmp/cinder-pub-cache.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cinder-pub-cache
          path: /tmp/cinder-pub-cache.tar.gz
          retention-days: 1
