name: Fix FFplay Arguments

on:
  push:
    branches:
      - feature/media-data-cli-clean

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Remove unsupported FFplay option
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/src/media/media.dart')
          text = path.read_text()
          old = """            '-nodisp',
            '-autoexit',
            '-nostdin',
            '-loglevel',
"""
          new = """            '-nodisp',
            '-autoexit',
            '-loglevel',
"""
          if old not in text:
              raise SystemExit('Expected FFplay argument block was not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Validate
        run: |
          dart pub get
          dart format lib/src/media/media.dart
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart --reporter expanded

      - name: Commit clean fix
        run: |
          git checkout origin/main -- .github/workflows/benchmark.yml
          rm .github/workflows/fix_ffplay_arguments.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): remove unsupported ffplay option"
          git push origin HEAD:feature/media-data-cli-clean
