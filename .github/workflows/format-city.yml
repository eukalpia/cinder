name: Format city source

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/format-city.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      - name: Format city example
        run: dart format example/web_showcase.dart
      - name: Commit formatted source
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart
          git commit -m "style: format interactive city example"
          git push origin HEAD:feature/cinder-web-city-runtime
