name: Fix living city compositing

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/fix-living-city-compositing.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        run: dart pub get
      - name: Composite colored glyphs in one Cinder paragraph
        run: |
          git pull --ff-only origin feature/cinder-web-city-runtime
          python3 - <<'PY'
          from pathlib import Path

          path = Path('example/web_showcase.dart')
          source = path.read_text(encoding='utf-8')

          old_render = '''              return Container(
                color: _Palette.voidBlack,
                child: Stack(
                  fit: StackFit.expand,
                  clipBehavior: Clip.hardEdge,
                  children: [
                    _layer(frame.stars, _Palette.star, FontWeight.dim),
                    _layer(frame.depth, _Palette.depth, FontWeight.dim),
                    _layer(frame.structure, _Palette.violetDim, FontWeight.dim),
                    _layer(
                        frame.violet, _Palette.violetBright, FontWeight.bold),
                    _layer(frame.orange, _Palette.orange, FontWeight.bold),
                    _layer(frame.pink, _Palette.pink, FontWeight.bold),
                    _layer(frame.glow, _Palette.orangeBright, FontWeight.bold),
                    _layer(frame.white, _Palette.white, FontWeight.bold),
                  ],
                ),
              );'''
          new_render = '''              return Container(
                color: _Palette.voidBlack,
                child: RichText(
                  text: frame.toTextSpan(),
                  softWrap: false,
                  overflow: TextOverflow.clip,
                ),
              );'''
          if old_render not in source:
              raise SystemExit('Layered render block was not found.')
          source = source.replace(old_render, new_render, 1)

          old_layer = '''  Widget _layer(String value, Color color, FontWeight weight) {
    return Positioned.fill(
      child: Text(
        value,
        softWrap: false,
        style: TextStyle(color: color, fontWeight: weight),
      ),
    );
  }

'''
          if old_layer not in source:
              raise SystemExit('Old layer helper was not found.')
          source = source.replace(old_layer, '', 1)

          old_frame_build = '''    return _WorldFrame(
      stars: _stars.build(),
      depth: _depth.build(),
      structure: _structure.build(),
      violet: _violet.build(),
      orange: _orange.build(),
      pink: _pink.build(),
      glow: _glow.build(),
      white: _white.build(),
    );'''
          new_frame_build = '''    return _WorldFrame(
      width: width,
      height: height,
      stars: _stars.build(),
      depth: _depth.build(),
      structure: _structure.build(),
      violet: _violet.build(),
      orange: _orange.build(),
      pink: _pink.build(),
      glow: _glow.build(),
      white: _white.build(),
    );'''
          if old_frame_build not in source:
              raise SystemExit('World frame builder was not found.')
          source = source.replace(old_frame_build, new_frame_build, 1)

          old_world_frame = '''class _WorldFrame {
  const _WorldFrame({
    required this.stars,
    required this.depth,
    required this.structure,
    required this.violet,
    required this.orange,
    required this.pink,
    required this.glow,
    required this.white,
  });

  final String stars;
  final String depth;
  final String structure;
  final String violet;
  final String orange;
  final String pink;
  final String glow;
  final String white;
}'''
          new_world_frame = '''class _WorldFrame {
  const _WorldFrame({
    required this.width,
    required this.height,
    required this.stars,
    required this.depth,
    required this.structure,
    required this.violet,
    required this.orange,
    required this.pink,
    required this.glow,
    required this.white,
  });

  final int width;
  final int height;
  final String stars;
  final String depth;
  final String structure;
  final String violet;
  final String orange;
  final String pink;
  final String glow;
  final String white;

  TextSpan toTextSpan() {
    final layers = <_StyledLayer>[
      _StyledLayer(
        stars,
        const TextStyle(color: _Palette.star, fontWeight: FontWeight.dim),
      ),
      _StyledLayer(
        depth,
        const TextStyle(color: _Palette.depth, fontWeight: FontWeight.dim),
      ),
      _StyledLayer(
        structure,
        const TextStyle(color: _Palette.violetDim, fontWeight: FontWeight.dim),
      ),
      _StyledLayer(
        violet,
        const TextStyle(
          color: _Palette.violetBright,
          fontWeight: FontWeight.bold,
        ),
      ),
      _StyledLayer(
        orange,
        const TextStyle(color: _Palette.orange, fontWeight: FontWeight.bold),
      ),
      _StyledLayer(
        pink,
        const TextStyle(color: _Palette.pink, fontWeight: FontWeight.bold),
      ),
      _StyledLayer(
        glow,
        const TextStyle(
          color: _Palette.orangeBright,
          fontWeight: FontWeight.bold,
        ),
      ),
      _StyledLayer(
        white,
        const TextStyle(color: _Palette.white, fontWeight: FontWeight.bold),
      ),
    ];
    final rows = layers.map((layer) => layer.text.split('\\n')).toList();
    final spans = <InlineSpan>[];

    for (var y = 0; y < height; y++) {
      var activeLayer = -2;
      var buffer = StringBuffer();

      void flush() {
        if (buffer.isEmpty) return;
        spans.add(
          TextSpan(
            text: buffer.toString(),
            style: activeLayer >= 0 ? layers[activeLayer].style : null,
          ),
        );
        buffer = StringBuffer();
      }

      for (var x = 0; x < width; x++) {
        var selectedLayer = -1;
        var glyph = ' ';

        for (var layerIndex = layers.length - 1; layerIndex >= 0; layerIndex--) {
          final layerRows = rows[layerIndex];
          if (y >= layerRows.length) continue;
          final row = layerRows[y];
          if (x >= row.length) continue;
          final candidate = row[x];
          if (candidate == ' ') continue;
          selectedLayer = layerIndex;
          glyph = candidate;
          break;
        }

        if (selectedLayer != activeLayer) {
          flush();
          activeLayer = selectedLayer;
        }
        buffer.write(glyph);
      }

      flush();
      if (y < height - 1) spans.add(const TextSpan(text: '\\n'));
    }

    return TextSpan(children: spans);
  }
}

class _StyledLayer {
  const _StyledLayer(this.text, this.style);

  final String text;
  final TextStyle style;
}'''
          if old_world_frame not in source:
              raise SystemExit('World frame class was not found.')
          source = source.replace(old_world_frame, new_world_frame, 1)

          path.write_text(source, encoding='utf-8')
          PY
          dart format example/web_showcase.dart
          dart analyze --fatal-infos
      - name: Commit compositing fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart
          git commit -m "fix(web): composite the living city without erasing layers"
          git push origin HEAD:feature/cinder-web-city-runtime
