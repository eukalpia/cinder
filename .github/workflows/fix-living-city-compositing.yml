name: Fix living city compositing

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/fix-living-city-compositing.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        run: dart pub get
      - name: Composite colored glyphs in one Cinder paragraph
        run: |
          git pull --ff-only origin feature/cinder-web-city-runtime
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('example/web_showcase.dart')
          source = path.read_text(encoding='utf-8')

          render_pattern = re.compile(
              r"              return Container\(\n"
              r"                color: _Palette\.voidBlack,\n"
              r"                child: Stack\([\s\S]*?\n"
              r"              \);\n"
              r"            },"
          )
          render_replacement = '''              return Container(
                color: _Palette.voidBlack,
                child: RichText(
                  text: frame.toTextSpan(),
                  softWrap: false,
                  overflow: TextOverflow.clip,
                ),
              );
            },'''
          source, render_count = render_pattern.subn(render_replacement, source, count=1)
          if render_count != 1 and 'text: frame.toTextSpan()' not in source:
              raise SystemExit('Unable to replace the layered render block.')

          layer_pattern = re.compile(
              r"\n  Widget _layer\([\s\S]*?\n  }\n\n  bool _handleKey"
          )
          source, layer_count = layer_pattern.subn('\n  bool _handleKey', source, count=1)
          if layer_count != 1 and 'Widget _layer(' in source:
              raise SystemExit('Unable to remove the erasing layer helper.')

          frame_pattern = '''    return _WorldFrame(
      stars: _stars.build(),'''
          frame_replacement = '''    return _WorldFrame(
      width: width,
      height: height,
      stars: _stars.build(),'''
          if frame_pattern in source:
              source = source.replace(frame_pattern, frame_replacement, 1)
          elif 'return _WorldFrame(\n      width: width,' not in source:
              raise SystemExit('Unable to add world dimensions.')

          world_frame = '''class _WorldFrame {
  const _WorldFrame({
    required this.width,
    required this.height,
    required this.stars,
    required this.depth,
    required this.structure,
    required this.violet,
    required this.orange,
    required this.pink,
    required this.glow,
    required this.white,
  });

  final int width;
  final int height;
  final String stars;
  final String depth;
  final String structure;
  final String violet;
  final String orange;
  final String pink;
  final String glow;
  final String white;

  TextSpan toTextSpan() {
    final layers = <_StyledLayer>[
      _StyledLayer(
        stars,
        const TextStyle(color: _Palette.star, fontWeight: FontWeight.dim),
      ),
      _StyledLayer(
        depth,
        const TextStyle(color: _Palette.depth, fontWeight: FontWeight.dim),
      ),
      _StyledLayer(
        structure,
        const TextStyle(color: _Palette.violetDim, fontWeight: FontWeight.dim),
      ),
      _StyledLayer(
        violet,
        const TextStyle(
          color: _Palette.violetBright,
          fontWeight: FontWeight.bold,
        ),
      ),
      _StyledLayer(
        orange,
        const TextStyle(color: _Palette.orange, fontWeight: FontWeight.bold),
      ),
      _StyledLayer(
        pink,
        const TextStyle(color: _Palette.pink, fontWeight: FontWeight.bold),
      ),
      _StyledLayer(
        glow,
        const TextStyle(
          color: _Palette.orangeBright,
          fontWeight: FontWeight.bold,
        ),
      ),
      _StyledLayer(
        white,
        const TextStyle(color: _Palette.white, fontWeight: FontWeight.bold),
      ),
    ];
    final rows = layers.map((layer) => layer.text.split('\\n')).toList();
    final spans = <InlineSpan>[];

    for (var y = 0; y < height; y++) {
      var activeLayer = -2;
      var buffer = StringBuffer();

      void flush() {
        if (buffer.isEmpty) return;
        spans.add(
          TextSpan(
            text: buffer.toString(),
            style: activeLayer >= 0 ? layers[activeLayer].style : null,
          ),
        );
        buffer = StringBuffer();
      }

      for (var x = 0; x < width; x++) {
        var selectedLayer = -1;
        var glyph = ' ';

        for (var layerIndex = layers.length - 1; layerIndex >= 0; layerIndex--) {
          final layerRows = rows[layerIndex];
          if (y >= layerRows.length) continue;
          final row = layerRows[y];
          if (x >= row.length) continue;
          final candidate = row[x];
          if (candidate == ' ') continue;
          selectedLayer = layerIndex;
          glyph = candidate;
          break;
        }

        if (selectedLayer != activeLayer) {
          flush();
          activeLayer = selectedLayer;
        }
        buffer.write(glyph);
      }

      flush();
      if (y < height - 1) spans.add(const TextSpan(text: '\\n'));
    }

    return TextSpan(children: spans);
  }
}

class _StyledLayer {
  const _StyledLayer(this.text, this.style);

  final String text;
  final TextStyle style;
}'''
          world_pattern = re.compile(
              r"class _WorldFrame \{[\s\S]*?\n\}\n\nabstract class _Palette"
          )
          source, world_count = world_pattern.subn(
              world_frame + '\n\nabstract class _Palette',
              source,
              count=1,
          )
          if world_count != 1:
              raise SystemExit('Unable to replace the world frame compositor.')

          path.write_text(source, encoding='utf-8')
          PY
          dart format example/web_showcase.dart
      - name: Commit compositing fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart
          git commit -m "fix(web): composite the living city without erasing layers"
          git push origin HEAD:feature/cinder-web-city-runtime
      - name: Analyze composited city
        run: dart analyze --fatal-infos
