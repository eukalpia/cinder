name: Finalize Media Analyzer Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'feature/media-data-cli-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Remove invalid override annotation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/src/media/media.dart')
          text = path.read_text()
          old = "  @override\n  Future<void> dispose() async {"
          if old not in text:
              raise SystemExit('Expected dispose override was not found.')
          path.write_text(text.replace(old, "  Future<void> dispose() async {", 1))
          PY
          dart format lib/src/media/media.dart

      - name: Validate
        run: |
          dart pub get
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart

      - name: Commit clean result
        run: |
          rm .github/workflows/diagnose_merge_analyzer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): finalize process lifecycle analysis"
          git push origin HEAD:feature/media-data-cli-clean
