name: Diagnose Merge Analyzer

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  analyze:
    if: github.event.pull_request.head.ref == 'feature/media-data-cli-clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Analyze merge ref
        continue-on-error: true
        run: dart analyze --fatal-infos 2>&1 | tee merge-analyzer.log

      - uses: actions/upload-artifact@v4
        with:
          name: merge-analyzer-output
          path: merge-analyzer.log
          retention-days: 1
