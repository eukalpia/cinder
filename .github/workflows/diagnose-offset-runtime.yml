name: Diagnose zero-delta pointer runtime

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply candidate fixes and capture checks
        shell: bash
        run: |
          set +e
          : > zero-delta-runtime.log
          python3 - <<'PY' >> zero-delta-runtime.log 2>&1
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f'{path}: expected {count} occurrence(s), found {actual}: {old!r}')
              file.write_text(text.replace(old, new, count))

          replace(
              'lib/src/framework/render_object.dart',
              '''  Offset operator +(Offset other) => Offset(dx + other.dx, dy + other.dy);
  Offset operator -(Offset other) => Offset(dx - other.dx, dy - other.dy);

  @override
  String toString() => 'Offset($dx, $dy)';
''',
              '''  Offset operator +(Offset other) => Offset(dx + other.dx, dy + other.dy);
  Offset operator -(Offset other) => Offset(dx - other.dx, dy - other.dy);

  @override
  bool operator ==(Object other) {
    return identical(this, other) ||
        other is Offset && other.dx == dx && other.dy == dy;
  }

  @override
  int get hashCode => Object.hash(dx, dy);

  @override
  String toString() => 'Offset($dx, $dy)';
''',
          )
          replace(
              'lib/src/components/gesture_detector.dart',
              '''    final target = Set<MouseButton>.of(event.buttons)
      ..remove(MouseButton.wheelUp)
      ..remove(MouseButton.wheelDown);
''',
              '''    final target = Set<MouseButton>.of(event.buttons)
      ..remove(MouseButton.wheelUp)
      ..remove(MouseButton.wheelDown);

    if (event.pressed &&
        event.button != MouseButton.wheelUp &&
        event.button != MouseButton.wheelDown) {
      target.add(event.button);
    } else if (!event.pressed) {
      target.remove(event.button);
    }
''',
          )
          replace(
              'lib/src/test/cinder_tester.dart',
              '    await sendMouseEvent(MouseEvent(button: button, x: x, y: y, pressed: true));',
              '''    await sendMouseEvent(
      MouseEvent(
        button: button,
        x: x,
        y: y,
        pressed: true,
        buttons: <MouseButton>{button},
      ),
    );''',
          )
          replace(
              'lib/src/test/cinder_tester.dart',
              '        MouseEvent(button: button, x: x, y: y, pressed: true, isMotion: true),',
              '''        MouseEvent(
          button: button,
          x: x,
          y: y,
          pressed: true,
          isMotion: true,
          buttons: <MouseButton>{button},
        ),''',
          )
          replace(
              'test/layout/anchored_list_view_test.dart',
              '      var builds = 0;\n',
              '      var builds = 0;\n      final builtIndices = <int>[];\n',
          )
          replace(
              'test/layout/anchored_list_view_test.dart',
              '''              itemBuilder: (_, index) {
                builds++;
                return SizedBox(
''',
              '''              itemBuilder: (_, index) {
                builds++;
                builtIndices.add(index);
                return SizedBox(
''',
          )
          replace(
              'test/layout/anchored_list_view_test.dart',
              '''        builds = 0;
        controller.jumpTo(50000);
''',
              '''        builds = 0;
        builtIndices.clear();
        controller.jumpTo(50000);
''',
          )
          replace(
              'test/layout/anchored_list_view_test.dart',
              "        expect(tester.terminalState, containsText('legacy 33333'));",
              '''        expect(builtIndices.length, greaterThan(0));
        expect(builtIndices.first, inInclusiveRange(30000, 40000));''',
          )
          PY
          patch_status=$?
          echo "patch_exit=$patch_status" >> zero-delta-runtime.log
          if [ "$patch_status" -eq 0 ]; then
            dart pub get >> zero-delta-runtime.log 2>&1
            pub_status=$?
            echo "pub_exit=$pub_status" >> zero-delta-runtime.log
            dart format \
              lib/src/framework/render_object.dart \
              lib/src/components/gesture_detector.dart \
              lib/src/test/cinder_tester.dart \
              test/layout/anchored_list_view_test.dart \
              >> zero-delta-runtime.log 2>&1
            format_status=$?
            echo "format_exit=$format_status" >> zero-delta-runtime.log
            dart analyze --fatal-infos >> zero-delta-runtime.log 2>&1
            analyze_status=$?
            echo "analyzer_exit=$analyze_status" >> zero-delta-runtime.log
            dart test --reporter expanded \
              test/components/text_field_editor_contract_test.dart \
              test/input/pointer_buttons_and_context_menu_test.dart \
              test/layout/anchored_list_view_test.dart \
              test/components/text_field_focus_test.dart \
              >> zero-delta-runtime.log 2>&1
            test_status=$?
            echo "test_exit=$test_status" >> zero-delta-runtime.log
          fi
          cat zero-delta-runtime.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: zero-delta-runtime-diagnostics
          path: zero-delta-runtime.log
          retention-days: 1
