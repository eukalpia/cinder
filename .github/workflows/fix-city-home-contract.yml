name: Fix city homepage contract

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/fix-city-home-contract.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Restore fixed hero and place live runtime below
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          page_path = Path('docs-site/src/app/page.tsx')
          page = page_path.read_text()

          page = page.replace(
              '<li>The city above is compiled from Dart, not a screenshot</li>',
              '<li>The interactive city below is compiled from Dart, not a screenshot</li>',
          )

          old_scene = '''          <section
            className="tui-panel control-scene"
            aria-label="Interactive Cinder cyber city runtime"
          >
            <div className="control-scene-title">
              <span className="control-scene-live">● LIVE</span>
              CINDER WEB · INTERACTIVE CELL CITY
            </div>
            {featured ? (
              <iframe
                title="Interactive Cinder cyber city"
                src={withBasePath('/city/')}
                className="control-scene-frame"
                loading="eager"
              />
            ) : (
              <div className="control-scene-fallback">
                <HeroCity />
              </div>
            )}
            <div className="control-scene-help" aria-hidden="true">
              <span>CLICK THE CITY TO FOCUS</span>
              <span>ARROWS · TAB · ENTER · D · E · SPACE · R</span>
            </div>
          </section>'''
          new_scene = '''          <section
            className="tui-panel control-scene"
            aria-label="Cinder city render pipeline"
          >
            <div className="control-scene-title">CINDER RENDER PIPELINE</div>
            <HeroCity />
            <span className="scene-tag scene-tag--state">STATE<br />▣▣▣</span>
            <span className="scene-tag scene-tag--diff">DIFF<br />▣▣▣</span>
            <span className="scene-tag scene-tag--events">EVENTS</span>
            <span className="scene-tag scene-tag--frame">FRAME&nbsp; 16.7ms</span>
          </section>'''
          if old_scene not in page:
              raise SystemExit('Current control scene block was not found.')
          page = page.replace(old_scene, new_scene, 1)

          page = page.replace(
              '<h2>THE CINDER PIPELINE</h2>',
              '<h2>CINDER RENDER PIPELINE</h2>',
              1,
          )

          old_controls = '''            <article className="tui-panel control-live-runtime__controls">
              <header>
                <span>INTERACTION MAP</span>
                <strong>FOCUS THE CITY FIRST</strong>
              </header>
              <div>
                {cityControls.map(([key, description]) => (
                  <p key={key}>
                    <kbd>{key}</kbd>
                    <span>{description}</span>
                  </p>
                ))}
              </div>
              <footer>
                <span>Mouse hover highlights nodes</span>
                <span>Clicking the core emits a pulse</span>
              </footer>
            </article>'''
          new_controls = '''            <iframe
              title={`${featured.title} interactive Cinder runtime`}
              src={withBasePath('/city/')}
              className="control-live-runtime__frame"
              loading="eager"
            />'''
          if old_controls not in page:
              raise SystemExit('Current interaction map block was not found.')
          page = page.replace(old_controls, new_controls, 1)

          page = re.sub(
              r"\nconst cityControls = \[.*?\n\] as const;\n",
              '\n',
              page,
              count=1,
              flags=re.S,
          )
          page_path.write_text(page)

          css_path = Path('docs-site/src/app/city-runtime.css')
          css = css_path.read_text()
          addition = '''

.control-scene > .hero-city {
  width: 100%;
  height: 100%;
  min-height: inherit;
  overflow: hidden;
}

.control-live-runtime__frame {
  display: block;
  width: 100%;
  min-width: 0;
  min-height: 560px;
  height: 560px;
  border: 1px solid var(--tui-line);
  background: #030409;
}

@media (max-width: 1180px) {
  .control-live-runtime__frame {
    min-height: 520px;
    height: 520px;
  }
}

@media (max-width: 760px) {
  .control-live-runtime__frame {
    min-height: 430px;
    height: 430px;
  }
}
'''
          marker = '.control-live-runtime__frame {'
          if marker not in css:
              css_path.write_text(css + addition)
          PY
      - name: Validate site source
        run: |
          cd docs-site
          npm ci
          npm run lint
          npm run typecheck
      - name: Commit homepage contract fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs-site/src/app/page.tsx docs-site/src/app/city-runtime.css
          git commit -m "fix(web): keep the poster and isolate the live city"
          git push origin HEAD:feature/cinder-web-city-runtime
