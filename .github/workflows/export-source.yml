name: Export source snapshot

on:
  push:
    branches:
      - feature/application-platform-and-charts
    paths:
      - .github/workflows/export-source.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/export-source.yml

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Archive repository
        run: |
          tar --exclude=.git -czf /tmp/cinder-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cinder-source
          path: /tmp/cinder-source.tar.gz
          retention-days: 1
