name: Apply living city compositor

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/apply-living-city-compositor.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        run: dart pub get
      - name: Apply non-erasing compositor
        run: |
          git pull --ff-only origin feature/cinder-web-city-runtime
          python3 - <<'PY'
          from pathlib import Path

          source_path = Path('example/web_showcase.dart')
          source = source_path.read_text(encoding='utf-8')
          donor = Path('.github/workflows/fix-living-city-compositing.yml').read_text(
              encoding='utf-8'
          )
          world_frame = donor.split("          world_frame = '''", 1)[1].split(
              "'''\n          world_pattern", 1
          )[0]

          if 'text: frame.toTextSpan()' not in source:
              render_start = source.index(
                  '              return Container(\n'
                  '                color: _Palette.voidBlack,\n'
                  '                child: Stack('
              )
              render_end_marker = '              );\n            },'
              render_end = source.index(render_end_marker, render_start) + len(
                  render_end_marker
              )
              source = (
                  source[:render_start]
                  + '''              return Container(
                color: _Palette.voidBlack,
                child: RichText(
                  text: frame.toTextSpan(),
                  softWrap: false,
                  overflow: TextOverflow.clip,
                ),
              );
            },'''
                  + source[render_end:]
              )

          layer_start_marker = '  Widget _layer('
          if layer_start_marker in source:
              layer_start = source.index(layer_start_marker)
              handle_start = source.index('  bool _handleKey', layer_start)
              source = source[:layer_start] + source[handle_start:]

          frame_old = '''    return _WorldFrame(
      stars: _stars.build(),'''
          frame_new = '''    return _WorldFrame(
      width: width,
      height: height,
      stars: _stars.build(),'''
          if frame_old in source:
              source = source.replace(frame_old, frame_new, 1)

          world_start = source.index('class _WorldFrame {')
          palette_start = source.index('abstract class _Palette', world_start)
          source = (
              source[:world_start]
              + world_frame
              + '\n\n'
              + source[palette_start:]
          )
          source_path.write_text(source, encoding='utf-8')
          PY
          dart format example/web_showcase.dart
      - name: Commit compositor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart
          git commit -m "fix(web): composite the living city without erasing layers"
          git push origin HEAD:feature/cinder-web-city-runtime
      - name: Analyze composited city
        run: dart analyze --fatal-infos
