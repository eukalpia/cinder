name: Diagnose editor analyzer

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Capture analyzer output
        shell: bash
        run: |
          set +e
          dart analyze --fatal-infos > editor-analyzer.log 2>&1
          status=$?
          echo "analyzer_exit=$status" >> editor-analyzer.log
          cat editor-analyzer.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: editor-analyzer-diagnostics
          path: editor-analyzer.log
          retention-days: 1
