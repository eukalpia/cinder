name: Export Dart SDK

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Package SDK
        run: |
          dart_bin="$(readlink -f "$(command -v dart)")"
          sdk_dir="$(dirname "$(dirname "$dart_bin")")"
          echo "SDK: $sdk_dir"
          tar -czf /tmp/dart-sdk.tar.gz -C "$(dirname "$sdk_dir")" "$(basename "$sdk_dir")"
      - uses: actions/upload-artifact@v4
        with:
          name: dart-sdk-linux-x64
          path: /tmp/dart-sdk.tar.gz
          retention-days: 1
