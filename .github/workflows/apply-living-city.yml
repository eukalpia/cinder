name: Apply living electric city

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/apply-living-city.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Write the living Cinder world
        env:
          CITY_PAYLOAD: 
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          payload = base64.b64decode(os.environ['CITY_PAYLOAD'])
          Path('example/web_showcase.dart').write_bytes(gzip.decompress(payload))
          PY
      - name: Put the real Cinder runtime in the hero
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs-site/src/app/page.tsx')
          source = path.read_text(encoding='utf-8')
          source = source.replace("import { HeroCity } from '@/components/hero-city';\n", '')
          old = '''          <section
            className="tui-panel control-scene"
            aria-label="Cinder city render pipeline"
          >
            <div className="control-scene-title">CINDER RENDER PIPELINE</div>
            <HeroCity />
            <span className="scene-tag scene-tag--state">STATE<br />▣▣▣</span>
            <span className="scene-tag scene-tag--diff">DIFF<br />▣▣▣</span>
            <span className="scene-tag scene-tag--events">EVENTS</span>
            <span className="scene-tag scene-tag--frame">FRAME&nbsp; 16.7ms</span>
          </section>'''
          new = '''          <section
            className="tui-panel control-scene control-scene--living"
            aria-label="Living Cinder electric city"
          >
            <iframe
              title="Living Cinder electric city"
              src={withBasePath('/city/')}
              className="control-scene-frame"
              loading="eager"
            />
          </section>'''
          if old not in source:
              raise SystemExit('The old static hero scene was not found.')
          source = source.replace(old, new, 1)
          source = source.replace(
              'The interactive city below is compiled from Dart, not a screenshot',
              'The world above is the compiled Dart application, not a screenshot',
          )
          source = source.replace(
              '''The city opens as the actual compiled Cinder application. Launch it
                inline, move the drone, wake nodes, toggle damage traces, pause the
                frame clock, and then resize the browser without the layout collapsing.''',
              '''The city is the actual compiled Cinder application. Electricity moves
                through the cable network, arcs jump between conductors, plasma climbs
                from the core, traffic crosses the districts, and the world recomposes
                itself whenever the terminal changes size.''',
          )
          source = source.replace('<span>Move <b>arrow keys</b></span>', '<span>Energy <b>↑ / ↓</b></span>')
          source = source.replace('<span>Nodes <b>Tab + Enter</b></span>', '<span>Phase <b>← / →</b></span>')
          source = source.replace('<span>Trace <b>D</b></span>', '<span>Surge <b>E / Enter / click</b></span>')
          path.write_text(source, encoding='utf-8')
          PY
      - name: Validate Dart and site
        run: |
          dart pub get
          dart format example/web_showcase.dart
          dart analyze --fatal-infos
          cd docs-site
          npm ci
          npm run lint
          npm run typecheck
      - name: Commit living city
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart docs-site/src/app/page.tsx
          git commit -m "feat(web): turn the Cinder hero into a living electric world"
          git push origin HEAD:feature/cinder-web-city-runtime
