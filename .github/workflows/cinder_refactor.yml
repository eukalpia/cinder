name: Cinder breaking refactor

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/scripts/cinder_breaking_refactor.py
      - .github/workflows/cinder_refactor.yml
      - lib/**
      - test/**
      - example/**
      - benchmark/**
      - packages/cinder_nested/**
      - packages/cinder_provider/**
      - packages/cinder_riverpod/**
      - packages/cinder_bloc/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cinder-breaking-refactor
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/flutter-core-breaking-refactor
          fetch-depth: 0

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Apply breaking migration
        shell: bash
        run: |
          set +e
          python3 .github/scripts/cinder_breaking_refactor.py >/tmp/cinder-migration.log 2>&1
          status=$?
          cat /tmp/cinder-migration.log
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/cinder-migration.log migration_failure.log
            git config user.name "Cinder Migration Bot"
            git config user.email "actions@users.noreply.github.com"
            git add migration_failure.log
            git commit --no-verify -m "[cinder-refactor] capture migration failure"
            git push origin HEAD:agent/flutter-core-breaking-refactor
            exit "$status"
          fi

      - name: Install dependencies
        run: dart pub get

      - name: Format source
        run: dart format lib test example benchmark

      - name: Analyze root package
        shell: bash
        run: |
          set +e
          dart analyze lib test example benchmark >/tmp/cinder-analyze.log 2>&1
          status=$?
          cat /tmp/cinder-analyze.log
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/cinder-analyze.log validation_failure.log
            git config user.name "Cinder Migration Bot"
            git config user.email "actions@users.noreply.github.com"
            git add validation_failure.log
            git commit --no-verify -m "[cinder-refactor] capture analyzer failure"
            git push origin HEAD:agent/flutter-core-breaking-refactor
            exit "$status"
          fi

      - name: Run root tests
        run: dart test -r expanded

      - name: Validate integration packages
        shell: bash
        run: |
          set +e
          : > /tmp/cinder-packages.log
          status=0
          for package in \
            packages/cinder_nested \
            packages/cinder_provider \
            packages/cinder_bloc \
            packages/cinder_riverpod
          do
            if [ ! -d "$package" ]; then
              continue
            fi
            echo "===== $package =====" >> /tmp/cinder-packages.log
            (
              cd "$package" || exit 1
              dart pub get || exit 1
              dart format --output=none --set-exit-if-changed lib test example 2>/dev/null || true
              dart analyze || exit 1
              if find test -name '*_test.dart' -print -quit 2>/dev/null | grep -q .; then
                dart test -r expanded || exit 1
              fi
            ) >> /tmp/cinder-packages.log 2>&1
            current=$?
            if [ "$current" -ne 0 ]; then
              status=$current
              break
            fi
          done
          cat /tmp/cinder-packages.log
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/cinder-packages.log package_validation_failure.log
            git config user.name "Cinder Migration Bot"
            git config user.email "actions@users.noreply.github.com"
            git add package_validation_failure.log
            git commit --no-verify -m "[cinder-refactor] capture package validation failure"
            git push origin HEAD:agent/flutter-core-breaking-refactor
            exit "$status"
          fi

      - name: Verify legacy API is gone
        shell: bash
        run: |
          test ! -e lib/src/app.dart
          test ! -e lib/src/frame.dart
          test -e lib/cinder.dart
          ! grep -R "package:nocterm" --include='*.dart' lib test example benchmark packages
          ! grep -R "Component" --include='*.dart' lib test example benchmark packages

      - name: Commit migration
        shell: bash
        run: |
          rm -f migration_failure.log validation_failure.log package_validation_failure.log
          git config user.name "Cinder Migration Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No generated migration changes to commit."
            exit 0
          fi
          git commit --no-verify -m "[cinder-refactor] complete Flutter-style API migration"
          git push origin HEAD:agent/flutter-core-breaking-refactor
