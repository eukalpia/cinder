name: Export stabilization source

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/export-stabilization-source.yml

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: stabilization/runtime-input-unicode
          fetch-depth: 0
      - name: Export repository tree metadata
        run: |
          git rev-parse HEAD > /tmp/commit.txt
          git rev-parse 'HEAD^{tree}' > /tmp/tree.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cinder-stabilization-tree
          path: |
            /tmp/commit.txt
            /tmp/tree.txt
          retention-days: 1
