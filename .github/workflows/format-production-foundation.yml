name: Normalize production foundation formatting

on:
  push:
    branches:
      - feature/production-foundation
    paths:
      - .github/workflows/format-production-foundation.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/production-foundation
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Format production foundation files
        run: |
          dart format \
            lib/cinder.dart \
            lib/src/backend/terminal.dart \
            lib/src/foundation/cancellation.dart \
            lib/src/foundation/debug_options.dart \
            lib/src/foundation/resource_scope.dart \
            lib/src/image/terminal_capabilities.dart \
            lib/src/keyboard/input_event.dart \
            lib/src/rendering/debug.dart \
            lib/src/utils/terminal_text.dart \
            lib/src/widgets/cinder_app.dart \
            test/backend/terminal_security_test.dart \
            test/foundation/cancellation_test.dart \
            test/foundation/debug_options_test.dart \
            test/foundation/resource_scope_test.dart \
            test/image/terminal_capabilities_test.dart \
            test/utils/terminal_text_test.dart
      - name: Commit normalized formatting
        run: |
          if git diff --quiet; then
            echo "Formatting already normalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          git commit -m "style: normalize production foundation"
          git push origin HEAD:feature/production-foundation
