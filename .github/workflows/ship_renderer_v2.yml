name: Clean Renderer V2 artifacts

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ship_renderer_v2.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - name: Remove temporary non-workflow artifacts
        shell: bash
        run: |
          rm -f \
            .github/scripts/apply_renderer_v2.py \
            .github/scripts/finalize_renderer_v2.py \
            .github/scripts/fix_focus_runtime.py \
            .github/renderer_v2_cleanup_manifest.tmp \
            .github/cleanup-placeholder.txt \
            .github/atomic-cleanup-instructions.txt \
            .github/do-not-keep.tmp \
            renderer_v2_error.log \
            integration_package_error.log \
            cinder_riverpod_analyzer.log \
            tool/ci_trigger.txt
          rm -rf ci_diagnostics
      - name: Commit cleanup
        run: |
          git config user.name "Cinder Cleanup Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- \
            .github/scripts \
            .github/renderer_v2_cleanup_manifest.tmp \
            .github/cleanup-placeholder.txt \
            .github/atomic-cleanup-instructions.txt \
            .github/do-not-keep.tmp \
            renderer_v2_error.log \
            integration_package_error.log \
            cinder_riverpod_analyzer.log \
            tool/ci_trigger.txt \
            ci_diagnostics
          if git diff --cached --quiet; then
            echo "No temporary artifacts remain."
            exit 0
          fi
          git commit --no-verify -m "chore: remove Renderer V2 diagnostics"
          git push origin HEAD:dev
