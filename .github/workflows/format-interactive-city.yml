name: Format Interactive City

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/format-interactive-city.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feature/interactive-cinder-city'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/interactive-cinder-city
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve package language version
        run: dart pub get
      - name: Format interactive city
        run: dart format example/web_showcase.dart
      - name: Commit formatter output and remove one-shot workflow
        shell: bash
        run: |
          git rm .github/workflows/format-interactive-city.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add example/web_showcase.dart
          git commit -m 'style(example): format interactive Cinder city'
          git push origin HEAD:feature/interactive-cinder-city
