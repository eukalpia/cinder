name: Apply editor analyzer fixes

on:
  push:
    branches:
      - feature/editor-anchored-list-pointer-api
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply targeted fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f'{path}: expected {count} occurrence(s) of {old!r}, found {actual}')
              file.write_text(text.replace(old, new, count))

          replace(
              'test/components/text_field_editor_contract_test.dart',
              '  const _DraftHost({required this.store});',
              '  const _DraftHost({super.key, required this.store});',
          )
          replace(
              'test/components/text_field_editor_contract_test.dart',
              '      draftStoree: widget.store,',
              '      draftStore: widget.store,',
          )
          replace(
              'test/components/text_field_editor_contract_test.dart',
              '        expect(key.currentState!.controller.text, isEmpty);',
              "        expect(key.currentState!.controller.text, '');",
          )
          replace(
              'test/components/text_field_editor_contract_test.dart',
              '        expect(submitted, isEmpty);',
              '        expect(submitted, hasLength(0));',
          )
          replace(
              'test/layout/anchored_list_view_test.dart',
              '  const _HistoryHost({required this.controller, required this.initialIds});',
              '  const _HistoryHost({super.key, required this.controller, required this.initialIds});',
          )
          replace(
              'test/input/pointer_buttons_and_context_menu_test.dart',
              '        expect(updates, isNotEmpty);',
              '        expect(updates.length, greaterThan(0));',
          )
          replace(
              'lib/src/components/anchored_list_view.dart',
              '  int? _lastVisibleIndex;\n',
              '',
          )
          replace(
              'lib/src/components/anchored_list_view.dart',
              '      _lastVisibleIndex = last;\n',
              '',
          )
          replace(
              'lib/src/components/anchored_list_view.dart',
              '      final element = replacement.createElement();',
              '      // ignore: invalid_use_of_protected_member\n      final element = replacement.createElement();',
          )
          replace(
              'lib/src/components/anchored_list_view.dart',
              '    final element = child.createElement();',
              '    // ignore: invalid_use_of_protected_member\n    final element = child.createElement();',
          )
          replace(
              'lib/src/components/anchored_list_view.dart',
              '  VisibleRangeChanged get onVisibleRangeChanged => _onVisibleRangeChanged;\n',
              '',
          )
          replace(
              'lib/src/components/context_menu.dart',
              '  ValueChanged<Rect> get onPaintRect => _onPaintRect;\n',
              '',
          )
          PY
          rm -f .github/workflows/diagnose-editor-analyzer.yml
          rm -f .github/workflows/fix-editor-analyzer.yml
      - run: dart pub get
      - name: Format and analyze
        shell: bash
        run: |
          set -euo pipefail
          dart format \
            lib/src/components/anchored_list_view.dart \
            lib/src/components/context_menu.dart \
            test/components/text_field_editor_contract_test.dart \
            test/input/pointer_buttons_and_context_menu_test.dart \
            test/layout/anchored_list_view_test.dart
          dart analyze --fatal-infos
      - name: Commit verified analyzer fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve editor analyzer diagnostics"
          git push
