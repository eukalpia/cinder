name: Apply scoped analyzer fix

on:
  push:
    branches:
      - feature/production-foundation
    paths:
      - .github/workflows/apply-analyzer-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/production-foundation
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Apply scoped fix
        run: |
          dart fix --apply lib/src/image/terminal_capabilities.dart
          dart format lib/src/image/terminal_capabilities.dart
          if git diff --quiet -- lib/src/image/terminal_capabilities.dart; then
            echo "No scoped fix required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/src/image/terminal_capabilities.dart
          git commit -m "fix(terminal): satisfy capability lint contract"
          git push origin HEAD:feature/production-foundation
