name: One-shot dev.2 version sync

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/sync-dev2-version.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clone, patch, validate, and push
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --quiet --branch agent/sync-dev2-versions \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo

          python3 - <<'PY'
          from pathlib import Path

          old = '1.0.0-dev.1'
          new = '1.0.0-dev.2'

          targets = [Path('README.md'), Path('pubspec.yaml')]
          targets.extend(sorted(Path('packages').glob('*/pubspec.yaml')))

          for path in targets:
              text = path.read_text(encoding='utf-8')
              path.write_text(text.replace(old, new), encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          old_prefix = '# 0.8.0\n\n## 1.0.0-dev.2\n\n'
          if text.startswith(old_prefix):
              text = '# 1.0.0-dev.2\n\n' + text[len(old_prefix):]

          marker = '\n\n## Bug Fixes'
          marker_index = text.find(marker)
          if marker_index >= 0 and '# 0.8.0' not in text[:marker_index]:
              text = text[:marker_index] + '\n\n---\n\n# 0.8.0' + text[marker_index:]

          changelog.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/sync-dev2-version.yml

          test "$(head -n 1 CHANGELOG.md)" = '# 1.0.0-dev.2'
          grep -q '^version: 1.0.0-dev.2$' pubspec.yaml
          grep -q 'Cinder `1.0.0-dev.2`' README.md
          ! grep -R '1.0.0-dev.1' pubspec.yaml README.md packages/*/pubspec.yaml
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md pubspec.yaml packages/*/pubspec.yaml .github/workflows/sync-dev2-version.yml
          git commit -m "chore: sync 1.0.0-dev.2 metadata"
          git push --quiet origin HEAD:agent/sync-dev2-versions
