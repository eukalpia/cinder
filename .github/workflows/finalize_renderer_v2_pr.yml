name: Renderer V2 finalizer diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/finalize_renderer_v2.py'
      - '.github/workflows/finalize_renderer_v2_pr.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply final architecture
        run: python3 .github/scripts/finalize_renderer_v2.py
      - name: Format finalizer targets
        run: |
          dart format \
            lib/src/buffer.dart \
            lib/src/rendering/frame_diff.dart \
            lib/src/framework/terminal_canvas.dart \
            lib/src/binding/terminal_binding.dart \
            lib/src/utils/escape_codes.dart \
            test/rendering/buffer_v2_test.dart \
            test/rendering/frame_diff_test.dart \
            benchmark/renderer_v2_benchmark.dart
      - run: dart pub get
      - name: Analyze finalizer targets
        run: dart analyze lib/src/buffer.dart lib/src/rendering/frame_diff.dart lib/src/framework/terminal_canvas.dart lib/src/binding/terminal_binding.dart lib/src/utils/escape_codes.dart test/rendering benchmark/renderer_v2_benchmark.dart
      - name: Test renderer contracts
        run: dart test test/rendering/buffer_v2_test.dart test/rendering/frame_diff_test.dart --reporter expanded
      - name: Test focus and TextField regressions
        run: |
          dart test \
            test/focus \
            test/components/text_field_clipboard_test.dart \
            test/components/text_field_cursor_test.dart \
            test/components/text_field_mouse_test.dart \
            test/components/text_field_vertical_selection_test.dart \
            test/input/shift_enter_newline_test.dart \
            --reporter expanded
      - name: Test complete root package
        run: dart test --reporter expanded
      - name: Run Renderer V2 benchmark contract
        run: dart run benchmark/renderer_v2_benchmark.dart
      - name: Validate integration packages
        shell: bash
        run: |
          for package in cinder_nested cinder_provider cinder_riverpod cinder_bloc; do
            echo "===== $package ====="
            (
              cd "packages/$package"
              dart pub get
              dart analyze --fatal-infos
              if find test -name '*_test.dart' -print -quit 2>/dev/null | grep -q .; then
                dart test --reporter expanded
              fi
            )
          done
