name: Format responsive example

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/format-responsive-example.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install stable Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        run: dart pub get
      - name: Format example
        run: dart format example/deep_route_text_field.dart
      - name: Commit formatted source
        run: |
          if git diff --quiet -- example/deep_route_text_field.dart; then
            echo "Already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/deep_route_text_field.dart
          git commit -m "style(example): format responsive route demo"
          git push origin HEAD:feature/cinder-web-city-runtime
