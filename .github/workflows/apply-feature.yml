name: Apply Feature Payload

on:
  push:
    branches:
      - feat/safe-terminal-and-app-widgets
    paths:
      - '.github/workflows/apply-feature.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/safe-terminal-and-app-widgets
          fetch-depth: 0
      - name: Apply feature patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/payload/feature.*.patch > /tmp/feature.patch
          echo "28c6be9ec4cb82295efb4a85e946949b4722a2960ab431f00444c731ea0bf23e  /tmp/feature.patch" | sha256sum -c -
          git apply --index /tmp/feature.patch

          rm -rf .github/payload
          rm -f .github/workflows/apply-feature.yml
          rm -f .github/workflows/export-source.yml
          rm -f .github/workflows/export-dart-sdk.yml
          rm -f .github/workflows/export-dart-env.yml

          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: add safe terminal output and application widgets"
          git push origin HEAD:feat/safe-terminal-and-app-widgets
