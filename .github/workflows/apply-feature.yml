name: Apply Feature Payload

on:
  push:
    branches:
      - feat/safe-terminal-and-app-widgets
    paths:
      - '.github/workflows/apply-feature.yml'
      - '.github/payload/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-safe-terminal-and-widgets
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/safe-terminal-and-app-widgets
          fetch-depth: 0

      - name: Publish run diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          printf '%s\n' "$GITHUB_RUN_ID" > .github/apply-run-id.txt
          git add .github/apply-run-id.txt
          git commit -m "ci: record feature apply run"
          git push origin HEAD:feat/safe-terminal-and-app-widgets

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Apply feature patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/payload/feature.*.patch > /tmp/feature.patch
          echo "0d6ec4be6acba114fb35c04018b1b80e8064c2c97ecda68345bf144c45b9c5e5  /tmp/feature.patch" | sha256sum -c -

          git apply --index --whitespace=fix \
            --exclude=CHANGELOG.md \
            --exclude=.github/workflows/export-source.yml \
            /tmp/feature.patch

          python3 - <<'PY'
          from pathlib import Path

          path = Path('CHANGELOG.md')
          text = path.read_text(encoding='utf-8')
          entry = '''# Unreleased

- Add explicit `TerminalText.safe` / `TerminalText.trusted` trust boundaries.
- Sanitize untrusted output at text, Markdown, canvas, buffer, cell, diff, and full-frame layers.
- Validate OSC title/icon metadata and Kitty, iTerm2, and Sixel image payloads.
- Harden failure-tolerant terminal state recovery and add fuzz/security tests.
- Add first-party application widgets for navigation, data, AI/developer workflows, and forms.
- Add `VirtualListView`, `SplitView`, `TreeView`, `DiffView`, and `CommandPalette` as the primary IDE building blocks.

---

'''
          if not text.startswith('# Unreleased'):
              path.write_text(entry + text, encoding='utf-8')
          PY

          mapfile -t dart_files < <(
            git diff --cached --name-only --diff-filter=ACMR \
              | grep -E '^(lib|test|example|benchmark)/.*\.dart$' || true
          )
          if [ "${#dart_files[@]}" -gt 0 ]; then
            dart format "${dart_files[@]}"
          fi

          git add CHANGELOG.md
          git add -u
          git add README.md doc lib test
          git diff --cached --check

      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          dart pub get
          dart analyze --fatal-infos
          dart test \
            test/application/application_widgets_test.dart \
            test/security/terminal_sanitizer_test.dart \
            test/security/terminal_protocol_security_test.dart \
            test/security/terminal_recovery_test.dart \
            --reporter expanded

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "feat: add safe terminal output and application widgets"
          git push origin HEAD:feat/safe-terminal-and-app-widgets
