name: Refine Interactive City Mobile

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/refine-interactive-city-mobile.yml'

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'feature/interactive-cinder-city'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/interactive-cinder-city
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Make the procedural city fit narrow terminal grids
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('example/web_showcase.dart')
          source = path.read_text()
          source = source.replace(
              'final width = math.max(48, constraints.maxWidth.floor());',
              'final width = math.max(32, constraints.maxWidth.floor());',
          )
          source = source.replace(
              'final scale = compact ? 0.72 : math.min(1.0, width / 132.0);',
              "final scale = compact\n        ? math.min(0.72, math.max(0.34, width / 92.0))\n        : math.min(1.0, width / 132.0);",
          )
          source = source.replace(
              'int sy(double value) => (value * (compact ? 0.68 : scale)).round();',
              "int sy(double value) =>\n      (value * (compact ? math.min(0.68, scale * 1.22) : scale)).round();",
          )
          source = source.replace(
              'return compact ? specs.take(7).toList(growable: false) : specs;',
              "if (!compact) return specs;\n  final visibleCount = scale < 0.48 ? 5 : 7;\n  return specs.take(visibleCount).toList(growable: false);",
          )
          source = source.replace(
              'final radiusX = compact ? 35 : math.min(58, buffer.width ~/ 2 - 4);\n  final radiusY = compact ? 10 : math.min(17, buffer.height ~/ 2 - 3);',
              "final radiusX = compact\n      ? math.max(10, math.min(35, buffer.width ~/ 2 - 3))\n      : math.min(58, buffer.width ~/ 2 - 4);\n  final radiusY = compact\n      ? math.max(5, math.min(10, buffer.height ~/ 2 - 3))\n      : math.min(17, buffer.height ~/ 2 - 3);",
          )
          path.write_text(source)
          PY
          dart format example/web_showcase.dart
      - name: Commit refinement and remove one-shot workflow
        shell: bash
        run: |
          git rm .github/workflows/refine-interactive-city-mobile.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add example/web_showcase.dart
          git commit -m 'feat(example): adapt interactive city to narrow terminal grids'
          git push origin HEAD:feature/interactive-cinder-city
