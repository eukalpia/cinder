name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_media_fix:
    name: Apply media lifecycle and adaptive viewport
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/media-data-cli-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Apply lifecycle and adaptive patches
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/apply_media_fixes.py')
          text = path.read_text()
          text = text.replace(
              "lifecycle_tests = '''\n",
              'lifecycle_tests = """\n',
              1,
          )
          text = text.replace(
              "  });\n'''\ntests = tests.replace(\n",
              '  });\n"""\ntests = tests.replace(\n',
              1,
          )
          path.write_text(text)
          PY
          python3 .github/apply_media_fixes.py

      - name: Validate media changes
        run: |
          dart pub get
          dart format lib/src/media/media.dart test/media_controller_test.dart
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart --reporter expanded

      - name: Commit clean product changes
        run: |
          git checkout origin/main -- .github/workflows/benchmark.yml
          rm .github/workflows/fix_media_open_race.yml
          rm .github/workflows/apply_media_lifecycle_and_adaptive.yml
          rm .github/apply_media_fixes.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): make opening atomic and adapt video to terminal"
          git push origin HEAD:feature/media-data-cli-clean

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # On PRs: download the baseline from the latest main run
      - name: Download baseline from main
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: benchmark.yml
          branch: main
          name: benchmark-baseline
          path: benchmark/
          if_no_artifact_found: warn

      # Run benchmarks (with --save to capture results, --ci for markdown)
      - name: Run benchmarks
        run: dart run benchmark/benchmark.dart --save --ci

      # On main: upload baseline for future PR comparisons
      - name: Upload baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-baseline
          path: benchmark/baseline.json
          retention-days: 90

      # On PRs: post results as a comment
      - name: Post benchmark comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: benchmark
          path: benchmark/results.md
