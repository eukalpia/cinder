name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix_ffplay:
    name: Apply FFplay compatibility fix
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/media-data-cli-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Remove unsupported option
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/src/media/media.dart')
          text = path.read_text()
          old = """            '-nodisp',
            '-autoexit',
            '-nostdin',
            '-loglevel',
"""
          new = """            '-nodisp',
            '-autoexit',
            '-loglevel',
"""
          if old not in text:
              raise SystemExit('Expected FFplay argument block was not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Validate media package
        run: |
          dart pub get
          dart format lib/src/media/media.dart
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart --reporter expanded

      - name: Commit clean product fix
        run: |
          git checkout origin/main -- .github/workflows/benchmark.yml
          rm -f .github/workflows/fix_ffplay_arguments.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): remove unsupported ffplay option"
          git push origin HEAD:feature/media-data-cli-clean

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # On PRs: download the baseline from the latest main run
      - name: Download baseline from main
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: benchmark.yml
          branch: main
          name: benchmark-baseline
          path: benchmark/
          if_no_artifact_found: warn

      # Run benchmarks (with --save to capture results, --ci for markdown)
      - name: Run benchmarks
        run: dart run benchmark/benchmark.dart --save --ci

      # On main: upload baseline for future PR comparisons
      - name: Upload baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-baseline
          path: benchmark/baseline.json
          retention-days: 90

      # On PRs: post results as a comment
      - name: Post benchmark comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: benchmark
          path: benchmark/results.md
