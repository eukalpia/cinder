name: Diagnose Renderer Production

on:
  pull_request:
    branches: [dev]
    paths:
      - '.github/workflows/diagnose_renderer_production.yml'
      - '.github/release_payload/**'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/renderer-production
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply payloads
        run: |
          python3 - <<'PY'
          import base64, gzip, io, subprocess, tarfile
          from pathlib import Path
          root = Path.cwd().resolve()
          payload = root / '.github' / 'release_payload'
          def decode(name):
              return gzip.decompress(base64.b64decode((payload / name).read_text()))
          def patch(name, payload_name):
              path = Path('/tmp') / name
              path.write_bytes(decode(payload_name))
              subprocess.run(['git', 'apply', '--whitespace=nowarn', str(path)], check=True)
          def extract(payload_name):
              with tarfile.open(fileobj=io.BytesIO(decode(payload_name)), mode='r:') as archive:
                  archive.extractall(root, filter='data')
          patch('phase23.patch', 'phase23.b64')
          extract('icons.b64')
          patch('image.patch', 'image_docs_patch.b64')
          extract('docs.b64')
          PY
      - run: python3 tool/generate_icon_packs.py
      - run: dart pub get
      - name: Analyze and capture report
        shell: bash
        run: |
          set +e
          dart analyze --fatal-infos 2>&1 | tee /tmp/root-analyzer.log
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/root-analyzer.log > /tmp/root-analyzer-tail.log
          exit $status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renderer-production-analyzer
          path: /tmp/root-analyzer-tail.log
