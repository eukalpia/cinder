name: Apply resolved project formatting

on:
  push:
    branches:
      - feature/editor-anchored-list-pointer-api
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Format with resolved package language version
        shell: bash
        run: |
          set -euo pipefail
          base="$(git merge-base origin/main HEAD)"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base" HEAD | grep -E '^(lib|test|example|benchmark)/.*\.dart$' || true)
          dart format "${files[@]}"
          rm -f .github/workflows/diagnose-editor-format.yml
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: format with resolved package language version"
          git push
