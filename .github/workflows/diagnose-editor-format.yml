name: Diagnose editor formatting

on:
  push:
    branches:
      - feature/editor-anchored-list-pointer-api
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Reproduce formatting gate
        shell: bash
        run: |
          set +e
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            base="$(git merge-base origin/main HEAD)"
          fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base" HEAD | grep -E '^(lib|test|example|benchmark)/.*\.dart$' || true)
          printf '%s\n' "${files[@]}" > format-input-files.txt
          dart --version > format-diagnostics.txt 2>&1
          dart format "${files[@]}" >> format-diagnostics.txt 2>&1
          status=$?
          echo "format_exit=$status" >> format-diagnostics.txt
          git diff --name-only -- "${files[@]}" > format-changed-files.txt
          git diff -- "${files[@]}" > format-changes.patch
          cat format-diagnostics.txt
          cat format-changed-files.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: editor-format-diagnostics
          path: |
            format-input-files.txt
            format-diagnostics.txt
            format-changed-files.txt
            format-changes.patch
          retention-days: 1
