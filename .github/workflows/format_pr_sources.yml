name: Diagnose Renderer V2 formatting

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/format_pr_sources.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Reproduce changed-file formatting
        shell: bash
        run: |
          git fetch origin main
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main HEAD | grep -E '^(lib|test|example|benchmark|packages/cinder_riverpod)/.*\.dart$' || true)
          {
            echo 'Changed Dart files:'
            printf '%s\n' "${files[@]}"
            echo
          } > format_diagnostic.log
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}" >> format_diagnostic.log 2>&1
          fi
          {
            echo
            echo 'Files modified by Dart 3.12.2 formatter:'
            git diff --name-only
          } >> format_diagnostic.log
      - name: Commit formatting and report
        run: |
          git config user.name "Cinder Format Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- '*.dart' format_diagnostic.log
          git commit --no-verify -m "style: normalize changed Cinder sources"
          git push origin HEAD:dev
