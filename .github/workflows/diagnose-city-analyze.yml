name: Fix city analyzer issues

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/diagnose-city-analyze.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install stable Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        run: dart pub get
      - name: Add required flow-control blocks
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('example/web_showcase.dart')
          source = path.read_text()
          old = """        if (x1 >= 0 && x1 < width && y1 >= 0 && y1 < height)\n          grid[y1][x1] = char;\n        if (x1 >= 0 && x1 < width && y2 >= 0 && y2 < height)\n          grid[y2][x1] = char;\n"""
          new = """        if (x1 >= 0 && x1 < width && y1 >= 0 && y1 < height) {\n          grid[y1][x1] = char;\n        }\n        if (x1 >= 0 && x1 < width && y2 >= 0 && y2 < height) {\n          grid[y2][x1] = char;\n        }\n"""
          if old not in source:
              raise SystemExit('Expected halo statements were not found.')
          path.write_text(source.replace(old, new, 1))
          PY
          dart format example/web_showcase.dart
          dart analyze --fatal-infos
      - name: Commit analyzer fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart
          git commit -m "fix(web): satisfy city analyzer rules"
          git push origin HEAD:feature/cinder-web-city-runtime
