name: Cinder CI Diagnostics

on:
  push:
    branches: [dev]
    paths:
      - '**.dart'
      - '**/pubspec.yaml'
      - '.github/workflows/ci_diagnostic.yml'
      - 'tool/ci_trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cinder-ci-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install root dependencies
        run: dart pub get
      - name: Run full diagnostics
        shell: bash
        run: |
          set +e
          rm -rf ci_diagnostics
          mkdir -p ci_diagnostics

          dart format --output=none --set-exit-if-changed lib test example benchmark packages >ci_diagnostics/format.log 2>&1
          echo $? > ci_diagnostics/format.status

          dart analyze lib test example benchmark >ci_diagnostics/analyze.log 2>&1
          echo $? > ci_diagnostics/analyze.status

          dart test -r expanded >ci_diagnostics/root_tests.log 2>&1
          echo $? > ci_diagnostics/root_tests.status
          grep -nE 'FAILED|\[E\]|Expected:|Actual:|Some tests failed|Failing tests:|Error:' ci_diagnostics/root_tests.log | tail -n 500 > ci_diagnostics/root_tests_summary.log || true
          tail -n 250 ci_diagnostics/root_tests.log > ci_diagnostics/root_tests_tail.log

          for package in packages/cinder_nested packages/cinder_provider packages/cinder_riverpod packages/cinder_bloc; do
            name=$(basename "$package")
            (
              cd "$package" || exit 1
              dart pub get && dart analyze && dart test -r expanded
            ) >"ci_diagnostics/${name}.log" 2>&1
            echo $? > "ci_diagnostics/${name}.status"
          done

          cat ci_diagnostics/*.status
      - name: Commit diagnostic logs
        shell: bash
        run: |
          git config user.name "Cinder CI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add ci_diagnostics
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit --no-verify -m "ci: capture full diagnostic results"
          git push origin HEAD:dev
