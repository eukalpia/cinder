name: Normalize Renderer V2 formatting

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/format_merge_diagnostic.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve formatter configuration
        run: |
          dart pub get
          (cd packages/cinder_riverpod && dart pub get)
      - name: Format changed root and Riverpod sources
        shell: bash
        run: |
          git fetch origin main
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main HEAD | grep -E '^(lib|test|example|benchmark|packages/cinder_riverpod)/.*\.dart$' || true)
          dart format "${files[@]}"
      - name: Commit normalized formatting
        run: |
          git config user.name "Cinder Format Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            benchmark/renderer_v2_benchmark.dart \
            lib/src/binding/terminal_binding.dart \
            lib/src/buffer.dart \
            lib/src/components/focus.dart \
            lib/src/framework/terminal_canvas.dart \
            lib/src/rendering/frame_diff.dart \
            lib/src/utils/escape_codes.dart \
            packages/cinder_riverpod/lib/cinder_riverpod.dart \
            packages/cinder_riverpod/lib/src/framework.dart \
            packages/cinder_riverpod/lib/src/provider_context.dart \
            packages/cinder_riverpod/lib/src/provider_dependencies.dart \
            test/rendering/buffer_v2_test.dart \
            test/rendering/frame_diff_test.dart
          if git diff --cached --quiet; then
            echo "Sources already use the resolved formatter configuration."
            exit 0
          fi
          git commit --no-verify -m "style: normalize Renderer V2 sources"
          git push origin HEAD:dev
