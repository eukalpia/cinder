name: Diagnose merge formatting

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/format_merge_diagnostic.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Diagnose root and Riverpod formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          set +e
          : > format-merge-report.txt
          echo "HEAD=$(git rev-parse HEAD)" >> format-merge-report.txt
          echo "BASE_SHA=$BASE_SHA" >> format-merge-report.txt
          echo >> format-merge-report.txt

          echo '===== ROOT =====' >> format-merge-report.txt
          dart pub get >> format-merge-report.txt 2>&1
          echo "pub_get_status=$?" >> format-merge-report.txt
          mapfile -t root_files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" HEAD | grep -E '^(lib|test|example|benchmark)/.*\.dart$' || true)
          printf 'file=%s\n' "${root_files[@]}" >> format-merge-report.txt
          dart format "${root_files[@]}" >> format-merge-report.txt 2>&1
          echo "format_status=$?" >> format-merge-report.txt
          git diff -- "${root_files[@]}" >> format-merge-report.txt 2>&1
          git diff --quiet -- "${root_files[@]}"
          echo "diff_status=$?" >> format-merge-report.txt
          git restore --worktree -- "${root_files[@]}"
          echo >> format-merge-report.txt

          echo '===== CINDER_RIVERPOD =====' >> format-merge-report.txt
          (cd packages/cinder_riverpod && dart pub get) >> format-merge-report.txt 2>&1
          echo "pub_get_status=$?" >> format-merge-report.txt
          prefix='packages/cinder_riverpod/'
          mapfile -t riverpod_files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" HEAD | grep -E "^${prefix}.*\\.dart$" || true)
          printf 'file=%s\n' "${riverpod_files[@]}" >> format-merge-report.txt
          dart format "${riverpod_files[@]}" >> format-merge-report.txt 2>&1
          echo "format_status=$?" >> format-merge-report.txt
          git diff -- "${riverpod_files[@]}" >> format-merge-report.txt 2>&1
          git diff --quiet -- "${riverpod_files[@]}"
          echo "diff_status=$?" >> format-merge-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: format-merge-report
          path: format-merge-report.txt
