name: Apply Media Runtime Hardening

on:
  push:
    branches:
      - feature/media-data-cli-clean

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/media-data-cli-clean
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Harden media runtime
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/src/media/media.dart')
          text = path.read_text()
          text = text.replace(
              "import 'dart:io';\n",
              "import 'dart:io';\nimport 'dart:math' as math;\n",
              1,
          )
          text = text.replace(
              '  Future<void> close();\n}',
              '  Future<void> close();\n\n  Future<void> dispose() => close();\n}',
              1,
          )
          text = text.replace(
              '    unawaited(backend.close());',
              '    unawaited(backend.dispose());',
              1,
          )

          start = text.index('class FfmpegMediaBackend implements MediaBackend {')
          end = text.index('\nextension _FirstOrNull', start)
          replacement = r'''class FfmpegMediaBackend implements MediaBackend {
            FfmpegMediaBackend({
              this.ffmpeg = 'ffmpeg',
              this.ffprobe = 'ffprobe',
              this.ffplay = 'ffplay',
              this.maxVideoWidth = 240,
              this.maxVideoHeight = 135,
              this.maxFrameRate = 30,
              this.lateFrameThreshold = const Duration(milliseconds: 120),
            })  : assert(maxVideoWidth > 0),
                  assert(maxVideoHeight > 0),
                  assert(maxFrameRate > 0) {
              _installShutdownHooks();
            }

            final String ffmpeg;
            final String ffprobe;
            final String ffplay;
            final int maxVideoWidth;
            final int maxVideoHeight;
            final double maxFrameRate;
            final Duration lateFrameThreshold;

            final StreamController<VideoFrame> _frames =
                StreamController<VideoFrame>.broadcast(sync: true);
            Process? _video;
            Process? _audio;
            Uri? _source;
            MediaInfo? _info;
            Duration _position = Duration.zero;
            double _volume = 1;
            double _speed = 1;
            int _generation = 0;
            bool _disposed = false;
            StreamSubscription<ProcessSignal>? _sigintSubscription;
            StreamSubscription<ProcessSignal>? _sigtermSubscription;
            StreamSubscription<ProcessSignal>? _sighupSubscription;

            @override
            Stream<VideoFrame> get videoFrames => _frames.stream;

            @override
            Future<MediaInfo> open(Uri source) async {
              _ensureActive();
              await close();
              _source = source;
              final result = await Process.run(
                ffprobe,
                <String>[
                  '-v',
                  'error',
                  '-print_format',
                  'json',
                  '-show_streams',
                  '-show_format',
                  _input(source),
                ],
                runInShell: Platform.isWindows,
              );
              if (result.exitCode != 0) {
                throw ProcessException(
                  ffprobe,
                  const <String>[],
                  result.stderr.toString(),
                  result.exitCode,
                );
              }
              final json = jsonDecode(result.stdout.toString()) as Map<String, dynamic>;
              final streams =
                  (json['streams'] as List<dynamic>? ?? const <dynamic>[])
                      .whereType<Map<String, dynamic>>()
                      .toList();
              final video = streams
                  .where((stream) => stream['codec_type'] == 'video')
                  .firstOrNull;
              final audio =
                  streams.any((stream) => stream['codec_type'] == 'audio');
              final format = json['format'] as Map<String, dynamic>?;
              final durationSeconds = double.tryParse(
                    '${format?['duration'] ?? video?['duration'] ?? 0}',
                  ) ??
                  0;
              final rate = _parseRate(
                '${video?['avg_frame_rate'] ?? video?['r_frame_rate'] ?? ''}',
              );
              _info = MediaInfo(
                duration: Duration(
                  microseconds: (durationSeconds * 1000000).round(),
                ),
                width: video?['width'] as int?,
                height: video?['height'] as int?,
                frameRate: rate,
                hasAudio: audio,
                hasVideo: video != null,
              );
              return _info!;
            }

            @override
            Future<void> play({
              required Duration position,
              required double volume,
              required double speed,
            }) async {
              _ensureActive();
              _position = position;
              _volume = volume;
              _speed = speed;
              await _restart();
            }

            @override
            Future<void> pause() => _stopProcesses();

            @override
            Future<void> seek(Duration position) async {
              _ensureActive();
              _position = position;
              if (_video != null || _audio != null) {
                await _restart();
              }
            }

            @override
            Future<void> setVolume(double volume) async {
              _ensureActive();
              _volume = volume;
              if (_audio != null) {
                await _restart();
              }
            }

            @override
            Future<void> setSpeed(double speed) async {
              _ensureActive();
              _speed = speed;
              if (_video != null || _audio != null) {
                await _restart();
              }
            }

            Future<void> _restart() async {
              final source = _source;
              final info = _info;
              if (source == null || info == null) {
                throw StateError('No media is open.');
              }
              await _stopProcesses();
              final generation = ++_generation;

              if (info.hasVideo && info.width != null && info.height != null) {
                final outputSize = _fitSize(info.width!, info.height!);
                final sourceRate = info.frameRate ?? maxFrameRate;
                final outputRate = math
                    .min(sourceRate, maxFrameRate)
                    .clamp(1, 240)
                    .toDouble();
                final stderrBuffer = StringBuffer();
                final playbackWatch = Stopwatch()..start();
                final process = await Process.start(
                  ffmpeg,
                  <String>[
                    '-hide_banner',
                    '-nostdin',
                    '-loglevel',
                    'error',
                    '-ss',
                    _seconds(_position),
                    '-i',
                    _input(source),
                    '-map',
                    '0:v:0',
                    '-an',
                    '-sn',
                    '-dn',
                    '-vf',
                    'scale=${outputSize.width}:${outputSize.height}:'
                        'flags=fast_bilinear,'
                        'fps=${outputRate.toStringAsFixed(3)},'
                        'setpts=PTS/${_speed.toStringAsFixed(4)}',
                    '-pix_fmt',
                    'rgba',
                    '-f',
                    'rawvideo',
                    'pipe:1',
                  ],
                  runInShell: Platform.isWindows,
                );
                _video = process;
                unawaited(_captureStderr(process, stderrBuffer));
                unawaited(
                  _readFrames(
                    process,
                    generation,
                    outputSize.width,
                    outputSize.height,
                    outputRate,
                    playbackWatch,
                  ),
                );
                unawaited(
                  _watchProcess(
                    process,
                    generation,
                    'video decoder',
                    stderrBuffer,
                  ),
                );
              }

              if (info.hasAudio) {
                final filters = <String>[];
                var remaining = _speed;
                while (remaining > 2) {
                  filters.add('atempo=2.0');
                  remaining /= 2;
                }
                while (remaining < 0.5) {
                  filters.add('atempo=0.5');
                  remaining /= 0.5;
                }
                filters.add('atempo=${remaining.toStringAsFixed(4)}');
                final stderrBuffer = StringBuffer();
                final process = await Process.start(
                  ffplay,
                  <String>[
                    '-nodisp',
                    '-autoexit',
                    '-nostdin',
                    '-loglevel',
                    'error',
                    '-ss',
                    _seconds(_position),
                    '-vn',
                    '-volume',
                    (_volume * 100).round().toString(),
                    '-af',
                    filters.join(','),
                    _input(source),
                  ],
                  runInShell: Platform.isWindows,
                );
                _audio = process;
                unawaited(_captureStderr(process, stderrBuffer));
                unawaited(
                  _watchProcess(
                    process,
                    generation,
                    'audio player',
                    stderrBuffer,
                  ),
                );
              }
            }

            Future<void> _readFrames(
              Process process,
              int generation,
              int width,
              int height,
              double frameRate,
              Stopwatch playbackWatch,
            ) async {
              final frameBytes = width * height * 4;
              var buffer = BytesBuilder(copy: false);
              var index = 0;
              await for (final chunk in process.stdout) {
                if (_disposed || generation != _generation) {
                  return;
                }
                buffer.add(chunk);
                final bytes = buffer.takeBytes();
                var offset = 0;
                while (bytes.length - offset >= frameBytes) {
                  if (_disposed || generation != _generation) {
                    return;
                  }
                  final relativePresentationTime = Duration(
                    microseconds:
                        (index * 1000000 / frameRate / _speed).round(),
                  );
                  final lead =
                      relativePresentationTime - playbackWatch.elapsed;
                  if (lead > Duration.zero) {
                    await Future<void>.delayed(lead);
                  }
                  if (_disposed || generation != _generation) {
                    return;
                  }
                  final lateness =
                      playbackWatch.elapsed - relativePresentationTime;
                  if (lateness <= lateFrameThreshold) {
                    _frames.add(
                      VideoFrame(
                        pixels: Uint8List.fromList(
                          bytes.sublist(offset, offset + frameBytes),
                        ),
                        width: width,
                        height: height,
                        presentationTime:
                            _position + relativePresentationTime,
                      ),
                    );
                  }
                  offset += frameBytes;
                  index++;
                }
                if (offset < bytes.length) {
                  buffer.add(bytes.sublist(offset));
                }
              }
            }

            Future<void> _captureStderr(
              Process process,
              StringBuffer target,
            ) async {
              await for (final line in process.stderr
                  .transform(const Utf8Decoder(allowMalformed: true))
                  .transform(const LineSplitter())) {
                if (target.length < 8192) {
                  target.writeln(line);
                }
              }
            }

            Future<void> _watchProcess(
              Process process,
              int generation,
              String label,
              StringBuffer stderrBuffer,
            ) async {
              final exitCode = await process.exitCode;
              if (_disposed || generation != _generation || exitCode == 0) {
                return;
              }
              final details = stderrBuffer.toString().trim();
              _frames.addError(
                ProcessException(
                  label,
                  const <String>[],
                  details.isEmpty
                      ? '$label exited with code $exitCode.'
                      : details,
                  exitCode,
                ),
              );
            }

            Future<void> _stopProcesses() async {
              _generation++;
              final processes = <Process>{
                if (_video != null) _video!,
                if (_audio != null) _audio!,
              };
              _video = null;
              _audio = null;
              await Future.wait(
                processes.map(_terminateProcess),
                eagerError: false,
              );
            }

            Future<void> _terminateProcess(Process process) async {
              try {
                if (Platform.isWindows) {
                  await Process.run(
                    'taskkill',
                    <String>['/PID', '${process.pid}', '/T', '/F'],
                    runInShell: true,
                  ).timeout(const Duration(seconds: 2));
                } else {
                  process.kill(ProcessSignal.sigterm);
                }
              } catch (_) {
                process.kill();
              }
              try {
                await process.exitCode
                    .timeout(const Duration(milliseconds: 700));
                return;
              } on TimeoutException {
                if (Platform.isWindows) {
                  process.kill();
                } else {
                  process.kill(ProcessSignal.sigkill);
                }
              }
              try {
                await process.exitCode
                    .timeout(const Duration(milliseconds: 700));
              } catch (_) {}
            }

            void _installShutdownHooks() {
              try {
                _sigintSubscription =
                    ProcessSignal.sigint.watch().listen((_) {
                  unawaited(_stopProcesses());
                });
              } catch (_) {}
              if (!Platform.isWindows) {
                try {
                  _sigtermSubscription =
                      ProcessSignal.sigterm.watch().listen((_) {
                    unawaited(_stopProcesses());
                  });
                } catch (_) {}
                try {
                  _sighupSubscription =
                      ProcessSignal.sighup.watch().listen((_) {
                    unawaited(_stopProcesses());
                  });
                } catch (_) {}
              }
            }

            _FrameSize _fitSize(int sourceWidth, int sourceHeight) {
              final scale = math.min(
                1.0,
                math.min(
                  maxVideoWidth / sourceWidth,
                  maxVideoHeight / sourceHeight,
                ),
              );
              var width = math.max(2, (sourceWidth * scale).round());
              var height = math.max(2, (sourceHeight * scale).round());
              if (width.isOdd) {
                width--;
              }
              if (height.isOdd) {
                height--;
              }
              return _FrameSize(width, height);
            }

            void _ensureActive() {
              if (_disposed) {
                throw StateError(
                  'The FFmpeg media backend has been disposed.',
                );
              }
            }

            @override
            Future<void> close() async {
              await _stopProcesses();
              _source = null;
              _info = null;
            }

            @override
            Future<void> dispose() async {
              if (_disposed) {
                return;
              }
              _disposed = true;
              await _stopProcesses();
              await _sigintSubscription?.cancel();
              await _sigtermSubscription?.cancel();
              await _sighupSubscription?.cancel();
              if (!_frames.isClosed) {
                await _frames.close();
              }
              _source = null;
              _info = null;
            }

            static String _input(Uri source) => source.scheme == 'file'
                ? source.toFilePath()
                : source.toString();

            static String _seconds(Duration value) =>
                (value.inMicroseconds / 1000000).toStringAsFixed(6);

            static double? _parseRate(String value) {
              final parts = value.split('/');
              if (parts.length == 2) {
                final numerator = double.tryParse(parts[0]);
                final denominator = double.tryParse(parts[1]);
                if (numerator != null &&
                    denominator != null &&
                    denominator != 0) {
                  return numerator / denominator;
                }
              }
              return double.tryParse(value);
            }
          }

          class _FrameSize {
            const _FrameSize(this.width, this.height);

            final int width;
            final int height;
          }
          '''

          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Validate
        run: |
          dart pub get
          dart format lib/src/media/media.dart
          dart analyze --fatal-infos
          dart test test/media_controller_test.dart

      - name: Commit hardened runtime
        run: |
          rm .github/workflows/fix_media_runtime.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): stop orphan audio and pace video frames"
          git push origin HEAD:feature/media-data-cli-clean
