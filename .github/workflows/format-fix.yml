name: Format Feature Changes

on:
  push:
    branches:
      - feat/safe-terminal-and-app-widgets
    paths:
      - '.github/workflows/format-fix.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/format-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/safe-terminal-and-app-widgets
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Collect changed Dart files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git diff --name-only --diff-filter=ACMR origin/main HEAD \
            | grep -E '^(lib|test|example|benchmark|packages)/.*\.dart$' \
            > /tmp/changed-dart-files.txt || true
          cat /tmp/changed-dart-files.txt
      - name: Run Dart formatter
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < /tmp/changed-dart-files.txt
          if [ "${#files[@]}" -gt 0 ]; then
            dart format "${files[@]}"
          fi
      - name: Commit formatter result
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Dart: $(dart --version 2>&1)"
            echo 'Changed by formatter:'
            git diff --name-only
          } > .github/format-report.txt
          git config user.name github-actions[bot]
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u
          git add -f .github/format-report.txt
          git status --short
          git commit --no-verify -m 'style: format safe terminal and application widgets'
      - name: Push formatter result
        shell: bash
        run: git push origin HEAD:feat/safe-terminal-and-app-widgets
