name: Export Renderer V2 Phase 2 patch

on:
  pull_request:
    branches: [dev]
    paths:
      - '.github/workflows/export_phase2_patch.yml'

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/renderer-v2-layers
          fetch-depth: 0
      - name: Reconstruct patch
        run: |
          python3 - <<'PY'
          import base64, gzip
          from pathlib import Path

          root = Path('.')
          outputs = []
          for name in ('part1.txt', 'patch.gz.b64'):
              text = (root / '.github/phase2_payload' / name).read_text().strip()
              text += '=' * (-len(text) % 4)
              outputs.append(gzip.decompress(base64.b64decode(text)))

          patch = b''.join(outputs)
          Path('/tmp/renderer-v2-phase2.patch').write_bytes(patch)
          print(f'patch bytes: {len(patch)}')
          PY
          git apply --check --whitespace=nowarn /tmp/renderer-v2-phase2.patch
      - uses: actions/upload-artifact@v4
        with:
          name: renderer-v2-phase2-patch
          path: /tmp/renderer-v2-phase2.patch
