name: Export Renderer V2 Phase 2 patch

on:
  pull_request:
    branches: [dev]
    paths:
      - '.github/workflows/export_phase2_patch.yml'

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/renderer-v2-layers
          fetch-depth: 0
      - name: Decode payload parts
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/phase2-payload
          python3 - <<'PY' > /tmp/phase2-payload/report.txt 2>&1
          import base64, gzip, traceback
          from pathlib import Path

          root = Path('.github/phase2_payload')
          for index, name in enumerate(('part1.txt', 'patch.gz.b64'), 1):
              try:
                  text = (root / name).read_text().strip()
                  text += '=' * (-len(text) % 4)
                  raw = base64.b64decode(text, validate=False)
                  print(name, 'base64_bytes=', len(raw), 'magic=', raw[:4])
                  decoded = gzip.decompress(raw)
                  out = Path(f'/tmp/phase2-payload/part{index}.patch')
                  out.write_bytes(decoded)
                  print(name, 'decoded_bytes=', len(decoded), 'prefix=', decoded[:100])
              except Exception:
                  print(name, 'FAILED')
                  traceback.print_exc()
          PY
          cat /tmp/phase2-payload/report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: renderer-v2-phase2-payload
          path: /tmp/phase2-payload
