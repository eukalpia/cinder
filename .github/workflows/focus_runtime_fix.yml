name: Focus runtime fix

on:
  pull_request:
    branches: [main]
    paths:
      - 'lib/src/components/focus.dart'
      - 'lib/src/components/text_field.dart'
      - '.github/scripts/fix_focus_runtime.py'
      - '.github/workflows/focus_runtime_fix.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: focus-runtime-fix
  cancel-in-progress: true

jobs:
  fix-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply focus runtime fix
        run: python3 .github/scripts/fix_focus_runtime.py
      - name: Format
        run: dart format lib/src/components/focus.dart
      - name: Install dependencies
        run: dart pub get
      - name: Analyze focus and text input
        run: dart analyze lib/src/components/focus.dart lib/src/components/text_field.dart
      - name: Run TextField and focus tests
        run: |
          dart test test/focus test/components/text_field_clipboard_test.dart test/components/text_field_mouse_test.dart test/components/text_field_cursor_test.dart test/components/text_field_vertical_selection_test.dart test/input/shift_enter_newline_test.dart --reporter expanded
      - name: Commit fix
        run: |
          git config user.name "Cinder CI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib/src/components/focus.dart
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit --no-verify -m "fix: make autofocus active for the first input frame"
          git push origin HEAD:dev
