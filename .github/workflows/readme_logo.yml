name: Add Cinder logo to README

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/readme_logo.yml'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Insert transparent logo
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          marker = '<div align="center">\n'
          logo = '\n<img src="doc/assets/cinder_logo.png" alt="Cinder" width="720">\n'

          if logo.strip() not in text:
              if marker not in text:
                  raise SystemExit('README header marker not found')
              text = text.replace(marker, marker + logo, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit README update
        shell: bash
        run: |
          git config user.name "Cinder Docs Bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "docs: show Cinder logo in README"
          git push origin HEAD:main
