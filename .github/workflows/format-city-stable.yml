name: Format city with stable Dart

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/format-city-stable.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
          fetch-depth: 0
      - name: Install stable Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Format exactly like CI
        run: |
          git pull --ff-only origin feature/cinder-web-city-runtime
          dart --version
          dart format example/web_showcase.dart
          git diff -- example/web_showcase.dart
      - name: Commit stable formatting
        run: |
          if git diff --quiet -- example/web_showcase.dart; then
            echo "Already formatted by stable Dart."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add example/web_showcase.dart
          git commit -m "style: apply stable Dart formatter"
          git push origin HEAD:feature/cinder-web-city-runtime
