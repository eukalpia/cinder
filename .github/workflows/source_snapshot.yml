name: Source Snapshot

on:
  push:
    branches:
      - feature/media-data-cli
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Pack source tree
        run: |
          tar --exclude=.git --exclude=.dart_tool --exclude=build -czf cinder-source.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: cinder-source
          path: cinder-source.tar.gz
          retention-days: 1
