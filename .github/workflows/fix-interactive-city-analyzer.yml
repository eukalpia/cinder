name: Fix Interactive City Analyzer

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/fix-interactive-city-analyzer.yml'

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/interactive-cinder-city'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/interactive-cinder-city
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply analyzer fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('example/web_showcase.dart')
          source = path.read_text()
          source = source.replace(
              'bool _handleKey(KeyEvent event, int buildingCount)',
              'bool _handleKey(KeyboardEvent event, int buildingCount)',
          )
          source = source.replace(
              "final y = centerY - 5 -\n        ((tick * 2 + index * 7) % math.max(8, centerY - 3));",
              "final particleRange = math.max(8, centerY - 3).toInt();\n    final y = centerY - 5 - ((tick * 2 + index * 7) % particleRange);",
          )
          path.write_text(source)
          PY
          dart format example/web_showcase.dart
      - name: Verify analyzer
        run: |
          dart pub get
          dart analyze --fatal-infos example/web_showcase.dart
      - name: Commit fixes and remove one-shot workflow
        shell: bash
        run: |
          git rm .github/workflows/fix-interactive-city-analyzer.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add example/web_showcase.dart
          git commit -m 'fix(example): resolve interactive city analyzer errors'
          git push origin HEAD:feature/interactive-cinder-city
