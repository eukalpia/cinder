name: Export worktree

on:
  push:
    branches:
      - feature/editor-anchored-list-pointer-api
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove Git metadata
        run: rm -rf .git
      - uses: actions/upload-artifact@v4
        with:
          name: cinder-worktree
          path: .
          include-hidden-files: true
          retention-days: 1
