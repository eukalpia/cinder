name: Diagnose root analyze

on:
  push:
    branches:
      - feature/cinder-web-city-runtime
    paths:
      - .github/workflows/diagnose-root-analyze.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinder-web-city-runtime
      - name: Install stable Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Capture analyzer output
        run: |
          dart pub get
          mkdir -p /tmp/cinder-analyze
          set +e
          dart analyze --fatal-infos > /tmp/cinder-analyze/analyze.txt 2>&1
          echo "$?" > /tmp/cinder-analyze/exit-code.txt
          set -e
      - name: Upload analyzer output
        uses: actions/upload-artifact@v4
        with:
          name: root-analyze-diagnostic
          path: /tmp/cinder-analyze
          if-no-files-found: error
