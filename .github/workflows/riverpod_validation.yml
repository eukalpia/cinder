name: Cinder Riverpod validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/cinder_riverpod/**'
      - '.github/workflows/riverpod_validation.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        working-directory: packages/cinder_riverpod
        run: dart pub get
      - name: Analyze with fatal infos
        shell: bash
        run: |
          set +e
          cd packages/cinder_riverpod
          dart analyze --fatal-infos > /tmp/cinder-riverpod-final.log 2>&1
          status=$?
          cd ../..
          tail -n 180 /tmp/cinder-riverpod-final.log > cinder_riverpod_analyzer.log
          git config user.name "Cinder Diagnostics Bot"
          git config user.email "actions@users.noreply.github.com"
          git add cinder_riverpod_analyzer.log
          git commit --no-verify -m "diagnostics: update Cinder Riverpod analyzer" || true
          git push origin HEAD:dev
          exit "$status"
      - name: Test
        working-directory: packages/cinder_riverpod
        run: dart test --reporter expanded
