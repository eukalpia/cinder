name: Format Web Adapters

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/format-web-adapters.yml'
      - 'docs-site/browser-adapters/**'

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feature/web-runtime-polish'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/web-runtime-polish
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Format browser adapters
        run: dart format docs-site/browser-adapters
      - name: Commit formatter output and remove one-shot workflow
        shell: bash
        run: |
          git rm .github/workflows/format-web-adapters.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs-site/browser-adapters
          git commit -m 'style(web): format browser adapters'
          git push origin HEAD:feature/web-runtime-polish
